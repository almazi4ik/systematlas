    internet_history: { id:'internet_history', title:'История Интернета', category:'technology', emoji:'🌐', infobox:{'Предшественник':'ARPANET (1969)','WWW':'Тим Бернерс-Ли, 1991','Пользователей в 2024':'≈5,4 млрд'}, summary:'Интернет — глобальная система объединённых компьютерных сетей, функционирующих на основе протоколов TCP/IP. Является крупнейшей в истории человечества информационной инфраструктурой.', full_text:`<p><strong>Интернет</strong> берёт начало в проекте ARPANET. 29 октября 1969 года состоялась первая передача данных. В 1991 году Тим Бернерс-Ли запустил первый веб-сайт.</p>`, see_also:['blockchain','quantum_computing'], refs:['Hafner K., Lyon M. Where Wizards Stay Up Late. 1996.'] },
    blockchain: { id:'blockchain', title:'Блокчейн', category:'technology', emoji:'🔗', infobox:{'Создан':'Сатоши Накамото, 2008','Первое применение':'Bitcoin (2009)'}, summary:'Блокчейн — децентрализованная база данных, в которой информация хранится в виде последовательной цепочки блоков, каждый из которых криптографически связан с предыдущим.', full_text:`<p><strong>Блокчейн</strong> — тип распределённого реестра, где транзакции группируются в блоки, каждый содержит криптографический хэш предыдущего.</p>`, see_also:['internet_history','quantum_computing'], refs:['Nakamoto S. Bitcoin White Paper. 2008.'] },

    artificial_intelligence: { id:'artificial_intelligence', title:'Искусственный интеллект', category:'technology', emoji:'🤖', infobox:{'Термин введён':'Джон Маккарти, 1956','Подходы':'МО, НС, ГИИ','Статус':'Активное развитие'}, summary:'Искусственный интеллект — область компьютерных наук, занимающаяся созданием систем, способных выполнять задачи, требующие человекоподобного интеллекта: распознавание речи, принятие решений, обучение.', full_text:`<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#ai-history">История</a></li><li><a href="#ai-types">Подходы</a></li><li><a href="#ai-now">Современное состояние</a></li></ol></div><p><strong>Искусственный интеллект</strong> (ИИ) — научная дисциплина и технологическое направление, целью которого является создание машин, способных к поведению, которое считается разумным у людей.</p><div class="article-section"><h2 class="section-h2" id="ai-history">История</h2><p>Термин «artificial intelligence» ввёл Джон Маккарти в 1956 году на Дартмутской конференции. Первые десятилетия характеризовались чередованием «AI-зим» (периодов разочарования) и «AI-вёсен» (прорывов).</p></div><div class="article-section"><h2 class="section-h2" id="ai-types">Основные подходы</h2><p>Машинное обучение (МО) — автоматическое извлечение закономерностей из данных. Нейронные сети — многослойные вычислительные модели, вдохновлённые биологическим мозгом. Глубокое обучение произвело революцию в распознавании образов и NLP.</p></div><div class="article-section"><h2 class="section-h2" id="ai-now">Современное состояние (2026)</h2><p>Большие языковые модели (GPT, Claude, Gemini) демонстрируют впечатляющие способности к рассуждению и генерации текста. AGI — искусственный общий интеллект — остаётся предметом дискуссий.</p></div>`, see_also:['agi','quantum_computing','cybernophobia'], refs:['McCarthy J. et al. A Proposal for the Dartmouth Summer Research Project on AI. 1955.','LeCun Y., Bengio Y., Hinton G. Nature, 2015.'] },

    cybersecurity: { id:'cybersecurity', title:'Кибербезопасность', category:'technology', emoji:'🔐', infobox:{'Ущерб в 2024':'~$9,5 трлн','Ключевые угрозы':'Ransomware, фишинг, APT'}, summary:'Кибербезопасность — область практики и науки, направленная на защиту компьютерных систем, сетей и данных от несанкционированного доступа, атак и повреждений.', full_text:`<p><strong>Кибербезопасность</strong> охватывает технологические, процессные и человеческие аспекты защиты цифровой инфраструктуры. С ростом подключённых устройств (IoT) и критической инфраструктуры цифровые угрозы стали одним из ключевых рисков национальной безопасности.</p><div class="article-section"><h2 class="section-h2">Основные угрозы</h2><p>Программы-вымогатели (ransomware) шифруют данные жертвы и требуют выкуп. APT-группы (Advanced Persistent Threats) — государственные акторы, ведущие долгосрочную кибершпионскую деятельность. Фишинг остаётся наиболее массовым вектором атак.</p></div>`, see_also:['internet_history','blockchain'], refs:['Stallings W. Cryptography and Network Security. 2022.'] },

    virtual_reality: { id:'virtual_reality', title:'Виртуальная реальность', category:'technology', emoji:'🥽', infobox:{'Первый шлем':'Ivan Sutherland, 1968','Популяризация':'Oculus Rift, 2016','Смежные концепции':'AR, MR, XR'}, summary:'Виртуальная реальность (VR) — технология, создающая интерактивное цифровое окружение, полностью замещающее визуальное восприятие реального мира с помощью специального оборудования.', full_text:`<p><strong>Виртуальная реальность</strong> — компьютерная симуляция, в которую пользователь погружается с помощью шлема отображения (HMD), контроллеров движения и системы отслеживания. В отличие от дополненной реальности (AR), VR полностью заменяет реальный визуальный мир цифровым.</p>`, see_also:['artificial_intelligence','internet_history'], refs:['Sutherland I. The Ultimate Display. IFIP, 1965.'] },

    // ─── ИСТОРИЯ ──────────────────────────────────────────────────────────
    ancient_rome: { id:'ancient_rome', title:'Древний Рим', category:'history', emoji:'🏛️', infobox:{'Основан':'753 до н.э. (традиц.)','Пик':'II в. н.э.','Столица':'Рим','Язык':'Латинский'}, summary:'Древний Рим — одна из крупнейших цивилизаций Античности, прошедшая путь от небольшого города-государства до средиземноморской империи, оказавшей огромное влияние на европейскую культуру, право и язык.', full_text:`<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#rome-republic">Республика</a></li><li><a href="#rome-empire">Империя</a></li><li><a href="#rome-legacy">Наследие</a></li></ol></div><p><strong>Древний Рим</strong> — государство, возникшее в Центральной Италии. Прошло три периода: царский (753–509 до н.э.), республиканский (509–27 до н.э.) и имперский (27 до н.э. — 476 н.э.).</p><div class="article-section"><h2 class="section-h2" id="rome-republic">Римская республика</h2><p>Республика установила систему двух консулов, сената и народных собраний. Пунические войны с Карфагеном (264–146 до н.э.) укрепили господство Рима над Средиземноморьем. Кризис поздней республики завершился гражданскими войнами и установлением власти Октавиана Августа.</p></div><div class="article-section"><h2 class="section-h2" id="rome-empire">Римская империя</h2><p>Период принципата (27 до н.э. — 284 н.э.) — «золотой век». При Траяне империя достигла максимальных размеров (5,9 млн км²). «Кризис III века» и разделение на Западную и Восточную части предвосхитили падение Западного Рима в 476 году.</p></div><div class="article-section"><h2 class="section-h2" id="rome-legacy">Наследие</h2><p>Римское право стало основой большинства европейских правовых систем. Латинский язык дал рождение романским языкам. Архитектурные достижения (арка, бетон, акведуки) повлияли на всё последующее строительство.</p></div>`, see_also:['ancient_egypt','renaissance'], refs:['Gibbon E. The Decline and Fall of the Roman Empire. 1776.','Mommsen T. Römische Geschichte. 1854.'] },

    ancient_egypt: { id:'ancient_egypt', title:'Древний Египет', category:'history', emoji:'🏺', infobox:{'Период':'ок. 3100–30 до н.э.','Столица':'Мемфис, Фивы, Александрия','Письменность':'Иероглифы','Религия':'Политеизм'}, summary:'Древний Египет — одна из древнейших и наиболее долговечных цивилизаций в истории человечества, просуществовавшая более трёх тысяч лет в долине Нила.', full_text:`<p><strong>Древний Египет</strong> — цивилизация Северо-Восточной Африки, возникшая в долине реки Нил около 3100 года до н.э. с объединением Верхнего и Нижнего Египта. Египтяне создали монументальную архитектуру (пирамиды, сфинксы, храмы), развитую письменность (иероглифы, иератика, демотика) и сложную религиозную систему с культом загробной жизни.</p><div class="article-section"><h2 class="section-h2">Пирамиды</h2><p>Пирамиды Гизы, включая Великую пирамиду Хеопса (139 м, ок. 2560 до н.э.) — единственное из Семи чудес Древнего мира, сохранившееся до наших дней. Они служили гробницами фараонов и символами их власти.</p></div>`, see_also:['ancient_rome','renaissance'], refs:['Kemp B. Ancient Egypt: Anatomy of a Civilization. 2006.'] },

    world_war_2: { id:'world_war_2', title:'Вторая мировая война', category:'history', emoji:'⚔️', infobox:{'Даты':'1 сент. 1939 — 2 сент. 1945','Участники':'57 государств','Погибших':'70–85 млн','Итог':'Победа Союзников'}, summary:'Вторая мировая война (1939–1945) — крупнейший военный конфликт в истории человечества, охвативший большинство стран мира и унёсший от 70 до 85 миллионов жизней.', full_text:`<p><strong>Вторая мировая война</strong> началась 1 сентября 1939 года вторжением Германии в Польшу. Конфликт разделился на два главных театра: Европейский и Тихоокеанский. Ключевые сражения: Сталинград (1942–43), Нормандия (1944), Мидуэй (1942). Война завершилась капитуляцией Германии 8 мая и Японии 2 сентября 1945 года. Её итогом стало создание ООН и начало холодной войны.</p>`, see_also:['cold_war','industrial_revolution'], refs:['Beevor A. The Second World War. 2012.','Keegan J. The Second World War. 1989.'] },

    renaissance: { id:'renaissance', title:'Ренессанс', category:'history', emoji:'🎨', infobox:{'Период':'XIV–XVII вв.','Центр':'Флоренция, Италия','Ключевые фигуры':'Леонардо, Микеланджело, Рафаэль'}, summary:'Ренессанс (Возрождение) — культурное и интеллектуальное движение XIV–XVII веков, ознаменовавшее переход от Средневековья к Новому времени через возрождение античных идеалов.', full_text:`<p><strong>Ренессанс</strong> зародился во Флоренции в XIV веке и постепенно охватил всю Европу. Центральной идеей стал <em>гуманизм</em> — концепция, ставящая человека в центр мироздания. Леонардо да Винчи воплотил идеал «универсального человека» (uomo universale), объединив науку и искусство. Изобретение печатного станка Гутенбергом (ок. 1440) ускорило распространение идей Ренессанса.</p>`, see_also:['ancient_rome','ancient_egypt'], refs:['Burckhardt J. The Civilization of the Renaissance in Italy. 1860.'] },

    cold_war: { id:'cold_war', title:'Холодная война', category:'history', emoji:'☢️', infobox:{'Даты':'1947–1991','Стороны':'США (НАТО) vs СССР (ОВД)','Итог':'Распад СССР (1991)'}, summary:'Холодная война — геополитическое противостояние СССР и США (1947–1991), характеризовавшееся гонкой вооружений, космической гонкой, идеологической борьбой и серией региональных конфликтов без прямого столкновения сверхдержав.', full_text:`<p><strong>Холодная война</strong> — период напряжённости между советским и западным блоками после Второй мировой войны. Доктрина Трумэна (1947), план Маршалла и создание НАТО (1949) оформили раскол мира. Кульминацией стал Карибский кризис 1962 года — ближайший момент к ядерной войне. Распад СССР в 1991 году ознаменовал окончание противостояния.</p>`, see_also:['world_war_2','internet_history'], refs:['Gaddis J.L. The Cold War: A New History. 2005.'] },

    industrial_revolution: { id:'industrial_revolution', title:'Промышленная революция', category:'history', emoji:'⚙️', infobox:{'Период':'1760–1840 (1-я волна)','Место':'Великобритания','Ключевое изобретение':'Паровая машина Уатта (1769)'}, summary:'Промышленная революция — переход от ручного труда и аграрной экономики к машинному производству и индустриальному обществу, начавшийся в Великобритании в 1760-х годах.', full_text:`<p><strong>Промышленная революция</strong> началась в Великобритании с текстильной промышленности и быстро распространилась на металлургию, транспорт и горное дело. Паровая машина Джеймса Уатта (1769) стала символом эпохи. Строительство железных дорог (с 1830-х) революционизировало транспорт и торговлю. Социальные последствия: урбанизация, появление рабочего класса и профсоюзов.</p>`, see_also:['ancient_rome','cold_war'], refs:['Landes D. The Unbound Prometheus. 1969.'] },

    // ─── БИОЛОГИЯ ─────────────────────────────────────────────────────────
    evolution: { id:'evolution', title:'Эволюция', category:'biology', emoji:'🦎', infobox:{'Автор теории':'Чарльз Дарвин, 1859','Механизм':'Естественный отбор','Современный синтез':'1940-е'}, summary:'Эволюция — процесс изменения наследственных признаков биологических популяций в ходе смены поколений, объясняющий всё разнообразие жизни на Земле.', full_text:`<p><strong>Теория эволюции</strong> Чарльза Дарвина, изложенная в «Происхождении видов» (1859), объяснила биологическое разнообразие через естественный отбор: особи с полезными вариациями выживают и передают их потомству. Современный эволюционный синтез объединил дарвинизм с генетикой Менделя и популяционной биологией.</p><div class="article-section"><h2 class="section-h2">Механизмы эволюции</h2><p>Мутации создают наследственную изменчивость. Естественный отбор отфильтровывает менее приспособленные варианты. Генетический дрейф — случайные изменения частот аллелей в малых популяциях. Половой отбор объясняет яркое оперение и другие «дорогостоящие» признаки.</p></div>`, see_also:['dna','cell_biology'], refs:['Darwin C. On the Origin of Species. 1859.','Dawkins R. The Selfish Gene. 1976.'] },

    dna: { id:'dna', title:'ДНК', category:'biology', emoji:'🧬', infobox:{'Открытие структуры':'Уотсон и Крик, 1953','Длина генома человека':'~3,2 млрд пар оснований','Кодирует':'~20 000 генов'}, summary:'ДНК (дезоксирибонуклеиновая кислота) — биополимер, хранящий генетическую информацию всех живых организмов. Двойная спираль ДНК кодирует инструкции по синтезу белков.', full_text:`<p><strong>ДНК</strong> — молекула в форме двойной спирали, описанной Уотсоном и Криком в 1953 году на основе рентгенографических данных Розалинд Франклин. Четыре азотистых основания (аденин, тимин, гуанин, цитозин) образуют «буквы» генетического кода. Проект «Геном человека» (1990–2003) расшифровал весь геном, открыв путь к персонализированной медицине.</p>`, see_also:['evolution','cell_biology','viruses'], refs:['Watson J.D., Crick F.H.C. Nature, 1953.'] },

    cell_biology: { id:'cell_biology', title:'Клеточная биология', category:'biology', emoji:'🔬', infobox:{'Открытие клетки':'Р. Гук, 1665','Клеточная теория':'Шлейден и Шванн, 1838–39'}, summary:'Клеточная биология изучает структуру и функции клетки — основной единицы жизни. Все живые организмы состоят из клеток, в которых протекают химические процессы жизнедеятельности.', full_text:`<p><strong>Клетка</strong> — минимальная структурная единица жизни. Прокариоты (бактерии, археи) лишены ядра; эукариоты (растения, животные, грибы) имеют оформленное ядро с хромосомами. Клеточная теория гласит: все организмы состоят из клеток, клетка — единица жизни, все клетки происходят из клеток.</p>`, see_also:['dna','evolution','viruses'], refs:['Alberts B. et al. Molecular Biology of the Cell. 2022.'] },

    ecosystems: { id:'ecosystems', title:'Экосистемы', category:'biology', emoji:'🌿', infobox:{'Крупнейшая':'Мировой океан','Биомов на Земле':'~14','Биомасса растений':'~450 Гт углерода'}, summary:'Экосистема — совокупность живых организмов и их абиотической среды, функционирующая как единое целое через потоки энергии и круговороты веществ.', full_text:`<p><strong>Экосистема</strong> — биологическая система, включающая сообщество организмов (биоценоз) и среду их обитания (биотоп), связанные обменом веществ и энергии. Трофические сети описывают передачу энергии от продуцентов (растения) через консументов к редуцентам. Потеря биоразнообразия снижает устойчивость экосистем к внешним воздействиям.</p>`, see_also:['evolution','dna'], refs:['Tansley A.G. Ecology, 1935.','Wilson E.O. The Diversity of Life. 1992.'] },

    human_brain: { id:'human_brain', title:'Мозг человека', category:'biology', emoji:'🧠', infobox:{'Масса':'≈1,4 кг','Нейронов':'≈86 млрд','Синапсов':'~100 трлн','Потребление':'~20% энергии тела'}, summary:'Мозг человека — сложнейший известный орган во Вселенной, центр нервной системы, обеспечивающий восприятие, мышление, память, эмоции и управление телом.', full_text:`<p><strong>Головной мозг</strong> состоит из нескольких ключевых структур: кора больших полушарий (мышление, речь, восприятие), лимбическая система (эмоции, память), мозжечок (координация), ствол мозга (жизненно важные функции). Пластичность мозга — способность перестраивать нейронные связи на протяжении всей жизни — открывает пути к реабилитации после повреждений.</p>`, see_also:['consciousness','dna','agi'], refs:['Kandel E.R. et al. Principles of Neural Science. 2021.'] },

    viruses: { id:'viruses', title:'Вирусы', category:'biology', emoji:'🦠', infobox:{'Размер':'20–300 нм','Открытие':'Д. Ивановский, 1892','Подходы':'ДНК-вирусы, РНК-вирусы'}, summary:'Вирусы — неклеточные инфекционные агенты, способные к репликации только внутри клеток-хозяев. Находятся на границе живого и неживого.', full_text:`<p><strong>Вирусы</strong> — субклеточные частицы, состоящие из нуклеиновой кислоты (ДНК или РНК), заключённой в белковую оболочку (капсид). Вирус не имеет собственного метаболизма и использует рибосомы хозяйской клетки для репликации. Пандемия COVID-19, вызванная SARS-CoV-2 (2019–2023), наглядно продемонстрировала глобальное воздействие вирусных инфекций на человечество.</p>`, see_also:['cell_biology','dna'], refs:['Flint S.J. et al. Principles of Virology. 2020.'] },

    // ─── ФИЛОСОФИЯ ────────────────────────────────────────────────────────
    stoicism: { id:'stoicism', title:'Стоицизм', category:'philosophy', emoji:'⚖️', infobox:{'Основатель':'Зенон Китийский, ок. 300 до н.э.','Школа':'Стоя (Афины)','Представители':'Марк Аврелий, Эпиктет, Сенека'}, summary:'Стоицизм — философская школа, основанная около 300 до н.э., учащая достигать душевного покоя через разграничение того, что в нашей власти, и того, что нет.', full_text:`<p><strong>Стоицизм</strong> учит, что источник страдания — не внешние события, а наши суждения о них. Центральная концепция — <em>дихотомия контроля</em>: ты не можешь контролировать события, но можешь контролировать свою реакцию. Марк Аврелий в «Размышлениях» и Эпиктет в «Беседах» оставили наиболее полные изложения стоической практики. Стоицизм переживает ренессанс в XXI веке как основа когнитивно-поведенческой терапии.</p>`, see_also:['existentialism','ethics','consciousness'], refs:['Marcus Aurelius. Meditations. 180 AD.','Epictetus. Enchiridion. 135 AD.'] },

    existentialism: { id:'existentialism', title:'Экзистенциализм', category:'philosophy', emoji:'🌑', infobox:{'Ключевые фигуры':'Сартр, Камю, Хайдеггер','Эпоха':'XX в.','Тезис':'«Существование предшествует сущности»'}, summary:'Экзистенциализм — философское направление XX века, утверждающее, что человек сначала существует, а затем определяет свою сущность через свободные выборы и ответственность.', full_text:`<p><strong>Экзистенциализм</strong> ставит в центр индивидуальный опыт существования. Жан-Поль Сартр сформулировал ключевой тезис: «существование предшествует сущности» — человек не имеет заданной природы, он сам творит себя через свободу. Альбер Камю исследовал абсурд — столкновение человеческой потребности в смысле с молчанием Вселенной. Мартин Хайдеггер анализировал «бытие-к-смерти» как условие подлинного существования.</p>`, see_also:['stoicism','consciousness','philosophy_of_mind'], refs:['Sartre J.-P. Being and Nothingness. 1943.','Camus A. The Myth of Sisyphus. 1942.'] },

    philosophy_of_mind: { id:'philosophy_of_mind', title:'Философия сознания', category:'philosophy', emoji:'🔮', infobox:{'Ключевая проблема':'«Трудная проблема» Чалмерса','Подходы':'Дуализм, физикализм, функционализм'}, summary:'Философия сознания исследует природу ментальных состояний: что такое сознание, как оно соотносится с мозгом и может ли машина быть сознательной.', full_text:`<p><strong>Философия сознания</strong> — раздел философии, исследующий природу психического. «Трудная проблема» Дэвида Чалмерса (1995) спрашивает: почему физические процессы порождают субъективный опыт (qualia)? Дуализм Декарта разделяет разум и тело; физикализм отождествляет ментальное с физическим; функционализм определяет ментальные состояния через их функциональную роль.</p>`, see_also:['consciousness','existentialism','agi'], refs:['Chalmers D. The Conscious Mind. 1996.','Dennett D. Consciousness Explained. 1991.'] },

    logic: { id:'logic', title:'Логика', category:'philosophy', emoji:'📊', infobox:{'Основатель':'Аристотель (сил.)','Математическая логика':'Фреге, 1879','Теорема':'Гёдель, 1931'}, summary:'Логика — раздел философии и математики, изучающий принципы правильного рассуждения: понятие истинности, структуру аргументов и законы вывода.', full_text:`<p><strong>Логика</strong> систематизирует принципы верного мышления. Аристотель создал силлогистику — первую формальную систему логических умозаключений. Готлоб Фреге в «Begriffsschrift» (1879) основал современную математическую логику. Теорема о неполноте Гёделя (1931) показала, что любая достаточно богатая формальная система либо неполна, либо противоречива.</p>`, see_also:['mathematics','philosophy_of_mind','prime_numbers'], refs:['Aristotle. Prior Analytics. 350 BC.','Gödel K. Über formal unentscheidbare Sätze. 1931.'] },

    ethics: { id:'ethics', title:'Этика', category:'philosophy', emoji:'🌿', infobox:{'Разделы':'Нормативная, прикладная, метаэтика','Ключевые теории':'Утилитаризм, деонтология, добродетельная этика'}, summary:'Этика — раздел философии, исследующий вопросы морали: что есть добро и зло, как следует поступать и каковы основания моральных суждений.', full_text:`<p><strong>Этика</strong> изучает нормативные основания человеческого поведения. Три главные теоретические традиции: утилитаризм (Бентам, Милль) — поступок морален, если максимизирует общее благополучие; деонтология (Кант) — существуют абсолютные моральные обязанности независимо от последствий; этика добродетели (Аристотель) — фокусируется на характере деятеля, а не на правилах или результатах.</p>`, see_also:['stoicism','existentialism','logic'], refs:['Kant I. Grundlegung zur Metaphysik der Sitten. 1785.','Mill J.S. Utilitarianism. 1863.'] },

    consciousness: { id:'consciousness', title:'Сознание', category:'philosophy', emoji:'✨', infobox:{'Статус':'Нерешённая проблема','Гипотезы':'ГВП, ИИТ, ОО-КО'}, summary:'Сознание — субъективный опыт бытия: ощущение «каково это — быть мной». Природа сознания остаётся одной из наиболее глубоких нерешённых проблем науки и философии.', full_text:`<p><strong>Сознание</strong> — одновременно наиболее знакомое и наиболее загадочное явление: каждый обладает им, но никто не может дать исчерпывающего объяснения. Основные гипотезы: Глобальное рабочее пространство (ГВП, Деан и Бааrs) описывает сознание как широковещательный механизм мозга. Интегрированная информационная теория (ИИТ, Тонони) связывает сознание с интеграцией информации (Φ). «Оркестрированная объективная редукция» (Пенроуз–Хамерофф) апеллирует к квантовым процессам в микротрубочках нейронов.</p>`, see_also:['philosophy_of_mind','human_brain','existentialism'], refs:['Chalmers D. Facing Up to the Problem of Consciousness. JCS, 1995.','Tononi G. Phi: A Voyage from the Brain to the Soul. 2012.'] },

    // ─── МАТЕМАТИКА ───────────────────────────────────────────────────────
    prime_numbers: { id:'prime_numbers', title:'Простые числа', category:'mathematics', emoji:'🔢', infobox:{'Определение':'Делится только на 1 и себя','Теорема':'Числа простых бесконечно','Гипотеза':'Римана (не доказана)'}, summary:'Простые числа — натуральные числа, большие 1, которые делятся только на 1 и на самих себя. Являются «атомами» арифметики и имеют фундаментальное значение в криптографии.', full_text:`<p><strong>Простые числа</strong> (2, 3, 5, 7, 11, …) составляют мультипликативные «атомы» натуральных чисел: по основной теореме арифметики, каждое натуральное число единственным образом раскладывается в произведение простых. Евклид доказал бесконечность простых чисел ок. 300 до н.э. Гипотеза Римана (1859) о распределении простых чисел остаётся одной из семи «Задач тысячелетия» Института Клэя.</p>`, see_also:['number_theory','infinity_math','logic'], refs:['Riemann B. Über die Anzahl der Primzahlen... 1859.','Hardy G.H., Wright E.M. An Introduction to the Theory of Numbers. 1938.'] },

    topology: { id:'topology', title:'Топология', category:'mathematics', emoji:'🍩', infobox:{'Раздел':'Геометрия','Ключевой объект':'Многообразие','Классик':'Пуанкаре, гипотеза 1904'}, summary:'Топология — раздел математики, изучающий свойства пространств, инвариантные при непрерывных деформациях (растяжении, изгибании, но не разрыве или склеивании).', full_text:`<p><strong>Топология</strong> исследует «качественные» свойства пространств. Знаменитый пример: кружка и пончик (тор) топологически эквивалентны — оба имеют ровно одну «ручку». Гипотеза Пуанкаре (1904) о 3-многообразиях была доказана Григорием Перельманом в 2003 году — единственная решённая «Задача тысячелетия». Перельман отказался от премии в $1 млн.</p>`, see_also:['prime_numbers','chaos_theory','number_theory'], refs:['Poincaré H. Cinquième complément à l\'Analysis situs. 1904.','Perelman G. ArXiv preprints. 2002–2003.'] },

    chaos_theory: { id:'chaos_theory', title:'Теория хаоса', category:'mathematics', emoji:'🦋', infobox:{'Основатель':'Э. Лоренц, 1963','Эффект':'«Эффект бабочки»','Применения':'Метеорология, биология, экономика'}, summary:'Теория хаоса изучает динамические системы, чрезвычайно чувствительные к начальным условиям: малейшее изменение входных данных приводит к кардинально различным результатам.', full_text:`<p><strong>Теория хаоса</strong> показывает, что детерминированные системы могут вести себя непредсказуемо. Эдвард Лоренц в 1963 году обнаружил, что ничтожная разница в начальных условиях атмосферной модели приводит к принципиально разным прогнозам. «Аттрактор Лоренца» — фрактальная структура в фазовом пространстве — стал иконой теории. «Эффект бабочки» (взмах крыльев бабочки в Бразилии вызывает торнадо в Техасе) — метафора этой чувствительности.</p>`, see_also:['topology','game_theory','infinity_math'], refs:['Lorenz E. Deterministic Nonperiodic Flow. JAS, 1963.','Gleick J. Chaos: Making a New Science. 1987.'] },

    game_theory: { id:'game_theory', title:'Теория игр', category:'mathematics', emoji:'♟️', infobox:{'Основоположник':'Джон фон Нейман, 1928','Нобелевские премии':'Нэш (1994), Шеллинг (2005)','Применения':'Экономика, политология, биология'}, summary:'Теория игр — математическая дисциплина, изучающая стратегии принятия решений в ситуациях, где результат зависит от действий нескольких участников.', full_text:`<p><strong>Теория игр</strong> формализует стратегическое взаимодействие. Джон Нэш ввёл понятие «равновесия Нэша» (1950) — состояния, при котором ни один игрок не выигрывает от одностороннего изменения стратегии. «Дилемма заключённого» демонстрирует, почему рациональные игроки могут приходить к субоптимальным исходам. Эволюционная теория игр объясняет поведение животных и механизмы кооперации.</p>`, see_also:['prime_numbers','logic','chaos_theory'], refs:['Von Neumann J., Morgenstern O. Theory of Games and Economic Behavior. 1944.','Nash J. Non-Cooperative Games. Annals of Mathematics, 1951.'] },

    infinity_math: { id:'infinity_math', title:'Бесконечность в математике', category:'mathematics', emoji:'♾️', infobox:{'Канторовы кардиналы':'ℵ₀, ℵ₁, …','Алеф-ноль':'Счётная бесконечность','Гипотеза':'Континуума (независима от ZFC)'}, summary:'Математическая бесконечность — строгая концепция, разработанная Георгом Кантором: существуют бесконечности разных «размеров», и некоторые из них несчётно больше других.', full_text:`<p><strong>Бесконечность</strong> в математике — не просто «очень большое число», а полноправный математический объект. Георг Кантор показал: множество натуральных чисел (ℵ₀, алеф-ноль) счётно, а множество действительных чисел строго «больше» и несчётно. Доказательство диагональю: предположив, что действительные числа перечислимы, можно построить число, которого нет в списке — противоречие. Гипотеза континуума (нет кардинала строго между ℵ₀ и мощностью континуума) независима от стандартных аксиом ZFC.</p>`, see_also:['prime_numbers','topology','apeirophobia'], refs:['Cantor G. Über eine elementare Frage der Mannigfaltigkeitslehre. 1891.','Cohen P. The Independence of the Continuum Hypothesis. 1963.'] },

    number_theory: { id:'number_theory', title:'Теория чисел', category:'mathematics', emoji:'📏', infobox:{'Прозвище':'«Королева математики»','Ключевые теоремы':'Ферма, Эйлера, Гаусса','Связь':'Криптография'}, summary:'Теория чисел — раздел математики, изучающий свойства целых чисел: делимость, простые числа, диофантовы уравнения и их связи с другими областями математики.', full_text:`<p><strong>Теория чисел</strong> восходит к античности (Евклид, Диофант), но расцвела в руках Ферма, Эйлера и Гаусса. Великая теорема Ферма (1637): уравнение xⁿ + yⁿ = zⁿ не имеет целых ненулевых решений при n > 2. Доказана Эндрю Уайлсом в 1995 году после 358 лет усилий. Современная теория чисел стала основой криптографии с открытым ключом (RSA).</p>`, see_also:['prime_numbers','topology','logic'], refs:['Gauss C.F. Disquisitiones Arithmeticae. 1801.','Wiles A. Annals of Mathematics, 1995.'] },

    // ─── ГУГОЛОГИЯ ────────────────────────────────────────────────────────
    googology_intro: {
      id: 'googology_intro', title: 'Гугология', category: 'googology', emoji: '🔭',
      infobox: { 'Термин':'от «googol» + «-logy»','Основатель':'Джонатан Бауэрс (1990-е)','Связь':'Теория функций, логика','Ключевой вопрос':'Что является наибольшим числом?' },
      summary: 'Гугология — неформальная математическая дисциплина, изучающая очень большие конечные числа и функции быстрого роста. Исследует пределы того, что вообще можно «определить» в математике.',
      full_text: `<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#what">Что такое гугология</a></li><li><a href="#notation">Системы нотации</a></li><li><a href="#fgh">Иерархия быстро растущих функций</a></li><li><a href="#limits">Пределы определимости</a></li></ol></div>
<p><strong>Гугология</strong> (от англ. <em>googology</em>) — раздел математики и любительская дисциплина, посвящённая изучению, именованию и сравнению очень больших конечных чисел. Она исследует границу между тем, что математически «определимо», и тем, что превосходит любое формальное описание.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="what">Что такое гугология</h2><p>Гугология задаёт вопрос: насколько большим может быть конечное число? Ответ оказывается парадоксальным — как только вы придумываете «самое большое» число, всегда находится ещё большее. Гугология систематизирует эту гонку, создавая строгую иерархию чисел и функций.<sup>[2]</sup></p>
<div class="note-box">💡 <strong>Факт:</strong> Число атомов в наблюдаемой Вселенной (~10⁸⁰) — ничтожная пылинка по меркам гугологии. Числа типа TREE(3) делают его буквально неотличимым от нуля.</div></div>
<div class="article-section"><h2 class="section-h2" id="notation">Системы нотации</h2><p>Обычная математическая запись (степени, суперстепени) беспомощна для больших гугологических чисел. Поэтому разработаны специальные нотации: стрелочная нотация Кнута (↑↑↑), скобочная нотация Конвея, массивная нотация Бауэрса (BEAF). Каждая следующая система экспоненциально мощнее предыдущей.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="fgh">Иерархия быстро растущих функций (FGH)</h2><p>FGH — формальная математическая система, в которой каждому трансфинитному ординалу α соответствует функция f_α(n), растущая всё быстрее с ростом α. f_0(n) = n+1 (функция следования), f_1(n) = 2n, f_ω(n) — уже несравнимо больше любой элементарной функции. Число Грэма — примерно f_{ω+1}(64) в этой иерархии.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="limits">Пределы определимости</h2><p>Гугология упирается в фундаментальные ограничения логики. Число Рэйо — наибольшее «именованное» число в стандартной математике. Но теорема Гёделя о неполноте подразумевает: всегда существуют числа, которые нельзя определить в данной формальной системе. Гугология буквально прощупывает границы математики.</p></div>`,
      see_also: ['googol','grahams_number','tree3','rayo_number','infinity_math'],
      refs: ['Bowers J. Exploding Array Function. 2002.','Sbiis Saibian. Large Numbers. googology.wikia.com.','Knuth D. Mathematics and Computer Science. Science, 1976.','Wainer S.S. Ordinal recursion. J. Symb. Logic, 1972.']

      summary: 'Гугол — число 10¹⁰⁰, единица со ста нулями. Придумано девятилетним мальчиком в 1938 году и стало отправной точкой гугологии. Несмотря на огромность, в гугологии считается «маленьким» числом.',
      full_text: `<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#origin">Происхождение</a></li><li><a href="#scale">Масштаб</a></li><li><a href="#google">Связь с Google</a></li></ol></div>
<p><strong>Гугол</strong> (англ. <em>googol</em>) = 10¹⁰⁰ — число, состоящее из единицы и ста нулей. Математически это выглядит так:</p>
<p style="font-family:monospace;font-size:13px;word-break:break-all;background:var(--color-bg-tertiary);padding:8px;border-radius:2px;">10 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000 000</p>
<div class="article-section"><h2 class="section-h2" id="origin">Происхождение названия</h2><p>В 1938 году американский математик Эдвард Каснер гулял с двумя племянниками и спросил девятилетнего Милтона Сиротту, как бы тот назвал очень-очень большое число. Мальчик придумал слово «googol». Каснер использовал это число в своей книге «Математика и воображение» (1940), и термин вошёл в обиход.<sup>[1]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="scale">Масштаб числа</h2><p>Гугол превышает количество атомов в наблюдаемой Вселенной (~10⁸⁰) примерно в 10²⁰ раз. Он больше числа элементарных частиц во Вселенной, больше числа возможных партий в шахматы (~10¹²⁰ — это уже «шахматное число» или число Шеннона). Тем не менее в гугологии гугол считается исчезающе малым — он даже близко не подходит к числу Грэма или TREE(3).<sup>[2]</sup></p>
<div class="note-box">🎲 <strong>Сравнение:</strong> Если бы каждый атом Вселенной был целой Вселенной, суммарное число атомов во всех этих вселенных всё равно было бы меньше гугола.</div></div>
<div class="article-section"><h2 class="section-h2" id="google">Связь с Google</h2><p>В 1997 году аспиранты Стэнфорда Лэрри Пейдж и Сергей Брин назвали свою поисковую систему «Googol» в знак безграничного количества веб-страниц, которые она должна была индексировать. Но при регистрации домена кто-то допустил опечатку, написав «Google» — и это имя осталось навсегда.<sup>[3]</sup></p></div>`,
      see_also: ['googolplex','grahams_number','infinity_math','googology_intro'],
      refs: ['Kasner E., Newman J. Mathematics and the Imagination. 1940.','Conway J.H., Guy R.K. The Book of Numbers. 1996.','Koller D. The History of Google\'s Name. Stanford, 2004.']
    },

      summary: 'Гуголплекс — число 10 в степени гугол (10^10^100). Его десятичная запись содержит гугол нулей — больше, чем атомов в наблюдаемой Вселенной. Физически невозможно записать это число полностью.',
      full_text: `<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#definition">Определение</a></li><li><a href="#impossibility">Невозможность записи</a></li><li><a href="#context">В контексте гугологии</a></li></ol></div>
<p><strong>Гуголплекс</strong> = 10^(10^100) = 10^гугол. Это единица, за которой следует гугол нулей. Уже само число нулей (гугол ≈ 10¹⁰⁰) превосходит число атомов во Вселенной примерно в 10²⁰ раз.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="impossibility">Физическая невозможность записи</h2><p>Если бы каждый атом наблюдаемой Вселенной (~10⁸⁰) был использован как один символ (одна цифра «0»), удалось бы записать лишь 10⁸⁰ нулей — несравнимо меньше гугола нулей, необходимых для записи гуголплекса. Даже если каждый атом сжать до планковского объёма и заполнить весь горизонт Вселенной — по-прежнему не хватит места.<sup>[2]</sup></p>
<div class="note-box">📝 <strong>Итог:</strong> Гуголплекс физически невозможно написать полностью ни в какой системе записи в этой Вселенной.</div></div>
<div class="article-section"><h2 class="section-h2" id="context">В контексте гугологии</h2><p>Несмотря на запредельный размер гуголплекса с точки зрения физики, в гугологии он по-прежнему считается скромным числом. Стрелочная нотация Кнута: 10↑↑3 = 10^10^10 уже больше гуголплекса. Число Грэма несравнимо превосходит гуголплекс в той же степени, в которой гуголплекс превосходит единицу.<sup>[3]</sup></p></div>`,
      see_also: ['googol','grahams_number','tree3','googology_intro'],

    grahams_number: {
      id: 'grahams_number', title: 'Число Грэма', category: 'googology', emoji: '∞',
      infobox: { 'Обозначение':'G или G₆₄','Нотация':'Стрелочная (Кнут)','Определено':'Рональд Грэм, 1977','Последние цифры':'…2464195387','Рекорд':'Попало в Книгу рекордов Гиннесса (1980)' },
      summary: 'Число Грэма — одно из наибольших чисел, когда-либо использованных в серьёзном математическом доказательстве. Оно настолько велико, что гуголплекс в сравнении с ним — буквально ноль. Определяется через башню стрелочных нотаций Кнута.',
      full_text: `<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#origin">Происхождение</a></li><li><a href="#notation">Стрелочная нотация</a></li><li><a href="#construction">Построение числа Грэма</a></li><li><a href="#digits">Последние цифры</a></li></ol></div>
<p><strong>Число Грэма</strong> — верхняя оценка в задаче Грэма–Ротшильда из рамсеевской комбинаторики: при каком минимальном числе измерений N гиперкуба гарантированно найдётся одноцветный «кирпич»? Грэм использовал это число как верхнюю границу N в 1977 году.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="notation">Стрелочная нотация Кнута</h2><p>Дональд Кнут ввёл стрелочную нотацию:
a↑b = aᵇ (возведение в степень)
a↑↑b = a^a^a^…^a (b раз) — тетрация
a↑↑↑b — пентация (башня тетраций)
Каждая дополнительная стрелка создаёт новый уровень «гиперопераций», экспоненциально превосходящий предыдущий.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="construction">Построение числа Грэма</h2><p>Определим последовательность: g₁ = 3↑↑↑↑3 (3 со стрелкой из четырёх стрелок). g₂ = 3↑…↑3, где количество стрелок равно g₁. g₃ = 3↑…↑3, где количество стрелок равно g₂. … Число Грэма G = g₆₄. Уже g₁ = 3↑↑↑↑3 несравнимо больше гуголплекса. Каждый следующий шаг делает предыдущее число «нулём».<sup>[3]</sup></p>
<div class="note-box">🤯 <strong>Разрыв шаблона:</strong> Если бы каждая планковская ячейка Вселенной содержала по одной цифре, удалось бы записать число, у которого примерно 10^185 цифр. Число Грэма имеет несравнимо больше цифр, чем сам гуголплекс имеет атомов.</div></div>
<div class="article-section"><h2 class="section-h2" id="digits">Последние цифры числа Грэма</h2><p>Хотя записать число Грэма целиком физически невозможно, математики вычислили его последние цифры: …2464195387. Последние 500 цифр числа Грэма известны точно — благодаря свойствам модульной арифметики последние k цифр числа Грэма зависят только от последних k цифр g₁.<sup>[4]</sup></p></div>`,
      see_also: ['googolplex','tree3','fast_growing','googology_intro'],
      refs: ['Graham R.L., Rothschild B.L. Ramsey\'s theorem for n-parameter sets. Trans. AMS, 1971.','Knuth D. Mathematics and Computer Science. Science, 1976.','Gardner M. Mathematical Games. Scientific American, 1977.','Padilla T. Graham\'s Number. Numberphile, 2012.']

<p><strong>TREE(3)</strong> — значение функции TREE, определённой Харви Фридманом на основе теоремы Крускала о деревьях (1960). Это конечное натуральное число, но оно настолько велико, что даже иерархия быстро растущих функций (FGH), описывающая число Грэма, не способна его описать без использования трансфинитных ординалов уровня «малого вудинового кардинала».<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="kruskal">Теорема Крускала</h2><p>Джозеф Крускал в 1960 году доказал: в любой бесконечной последовательности конечных деревьев с пометками обязательно найдутся два дерева, такие что первое вкладывается (топологически) во второе. Это кажется простым утверждением, но его доказательство требует трансфинитной индукции — обычной математикой Пеано не обойтись.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="tree_game">Игра TREE</h2><p>TREE(n) — длина наидлиннейшей допустимой последовательности деревьев с n метками, где каждое следующее дерево не содержит в себе никакого предыдущего (отношение «минора»). TREE(1) = 1. TREE(2) = 3. TREE(3) = ??? (конечное, но запредельно большое).<sup>[3]</sup></p>
<div class="note-box">🌲 <strong>Скачок:</strong> От TREE(2)=3 к TREE(3) — такой же качественный скачок, как от 0 к числу Грэма, только многократно усиленный. TREE(3) настолько больше числа Грэма, что само число Грэма — буквально ноль в сравнении.</div></div>
<div class="article-section"><h2 class="section-h2" id="proof">Почему TREE(3) конечно</h2><p>Конечность TREE(3) следует из теоремы Крускала: любая такая последовательность заведомо конечна. Но «насколько» конечна — измеряется ординалами из теории больших кардиналов. Для доказательства конкретной верхней границы потребовалась бы аксиома о существовании «малого вудинового кардинала» — объект, который сам по себе является одним из наиболее мощных допускаемых стандартной математикой.<sup>[4]</sup></p></div>`,

      full_text: `<p><strong>Число Скьюса</strong> возникло в 1933 году, когда Стэнли Скьюс доказал (при условии справедливости гипотезы Римана), что первое пересечение π(x) и Li(x) происходит не позднее, чем при x = e^e^e^79 ≈ 10^(10^(10^34)). Это число было настолько велико, что Годфри Харди назвал его «наибольшим числом, которое когда-либо служило какой-либо определённой цели в математике». Позднее оценка была улучшена до e^(1.1·10³¹) ≈ 1.4·10³¹⁶. Несмотря на колоссальность, число Скьюса несравнимо меньше числа Грэма или TREE(3).</p>`,

      full_text: `<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#definition">Определение</a></li><li><a href="#values">Известные значения</a></li><li><a href="#uncomputable">Невычислимость</a></li><li><a href="#growth">Рост</a></li></ol></div>
<p><strong>Функция Занятого бобра</strong> (BB или Σ) определена Тибором Радо в 1962 году: Σ(n) — максимальное количество символов «1», которое может напечатать машина Тьюринга с n состояниями, двумя символами и пустой лентой, прежде чем остановиться.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="values">Известные значения</h2><p>Σ(1) = 1. Σ(2) = 4. Σ(3) = 6. Σ(4) = 13. Σ(5) = 47 176 870 (доказано в 2024 году!). BB(6) > 10^(10^(10^(10^18 705 352))). BB(7) > 10^↑↑15. Каждый новый шаг создаёт число, несравнимо превосходящее предыдущее.<sup>[2]</sup></p>
<div class="note-box">🦫 <strong>BB(5) = 47 176 870</strong> было окончательно доказано в 2024 году командой исследователей через формальную верификацию всех 88 664 машин Тьюринга с 5 состояниями.</div></div>
<div class="article-section"><h2 class="section-h2" id="uncomputable">Невычислимость</h2><p>BB(n) не может быть вычислена никаким алгоритмом — это доказанный факт. Если бы BB была вычислима, можно было бы решить проблему остановки: чтобы проверить, останавливается ли машина M с n состояниями, достаточно прогнать её BB(n)+1 шагов; если не остановилась — никогда не остановится. Но проблема остановки неразрешима, значит, и BB невычислима.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="growth">Рост быстрее всего вычислимого</h2><p>BB(n) растёт быстрее любой вычислимой функции — это математически строгий факт. Это означает, что при достаточно большом n функция BB превзойдёт любую функцию, которую когда-либо мог бы написать математик. Именно поэтому BB(n) находится «за пределами» обычной гугологии — гугология занимается вычислимыми числами.<sup>[4]</sup></p></div>`,

function buildBreadcrumbs(items) {
  const parts = [`<a class="bc-link" onclick="showHome()">Главная</a>`];
  items.forEach((item, i) => {
    parts.push(`<span class="bc-sep">›</span>`);
    if (i === items.length - 1) parts.push(`<span class="bc-current">${item.label}</span>`);
    else parts.push(`<a class="bc-link" onclick="${item.action}">${item.label}</a>`);
  });
  return `<div class="breadcrumbs">${parts.join('')}</div>`;
}

// Загружаем реальный thumbnail через Wikimedia REST API
async function loadWikiPhoto(el, file, caption, fallbackEmoji) {
  const encoded = encodeURIComponent(file.replace(/ /g, '_'));
  const apiUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=File:${encoded}&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`;
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();
    const pages = data.query.pages;
    const page = Object.values(pages)[0];
    const thumbUrl = page?.imageinfo?.[0]?.thumburl;
    if (thumbUrl) {
      el.innerHTML = `
        <img src="${thumbUrl}" alt="${caption}" style="width:100%;height:140px;object-fit:cover;display:block;">
        ${caption ? `<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.65);color:#ddd;font-size:10px;padding:3px 7px;line-height:1.4;">${caption}</div>` : ''}
      `;
    } else {
      el.innerHTML = `<div style="height:140px;display:flex;align-items:center;justify-content:center;font-size:48px;">${fallbackEmoji}</div>`;
    }
  } catch(e) {
    el.innerHTML = `<div style="height:140px;display:flex;align-items:center;justify-content:center;font-size:48px;">${fallbackEmoji}</div>`;
  }
}

function buildInfobox(article) {
  const rows = Object.entries(article.infobox).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const photo = ARTICLE_PHOTOS[article.id];
  const fallbackEmoji = article.emoji || '📄';
  let imgHtml;
  if (photo) {
    const uid = 'img_' + article.id;
    // Запускаем загрузку через API после рендера
    setTimeout(() => {
      const el = document.getElementById(uid);
      if (el) loadWikiPhoto(el, photo.file, photo.caption, fallbackEmoji);
    }, 50);
    imgHtml = `<div class="infobox-img" id="${uid}" style="padding:0;background:#111;position:relative;overflow:hidden;">
      <div style="height:140px;display:flex;align-items:center;justify-content:center;color:#555;font-size:12px;">загрузка фото…</div>
    </div>`;
  } else {
    imgHtml = `<div class="infobox-img">${fallbackEmoji}</div>`;
  }
  return `<div class="infobox"><div class="infobox-title">${article.title}</div>${imgHtml}<table><tbody>${rows}</tbody></table></div>`;
}

function buildSeeAlso(ids) {
  if (!ids || !ids.length) return '';
  const links = ids.map(id => {
    const a = WIKI_DATA.articles[id];
    if (!a) return '';
    return `<li><a class="wiki-link" onclick="showPage('${id}')" data-id="${id}">${a.title}</a></li>`;
  }).join('');
  return `<div class="see-also"><div class="see-also-title">См. также</div><ul>${links}</ul></div>`;
}

function buildRefs(refs) {
  if (!refs || !refs.length) return '';
  const items = refs.map(r => `<li>${r}</li>`).join('');
  return `<div class="references"><strong>Примечания и литература</strong><ol>${items}</ol></div>`;
}

function renderArticle(article, activeTab) {
  activeTab = activeTab || 'read';
  const cat = WIKI_DATA.categories[article.category];
  const votes = getVotes(article.id);
  const userVote = getUserVote(article.id);
  const total = votes.likes + votes.dislikes;
  const likesPct = total > 0 ? Math.round((votes.likes / total) * 100) : 50;

  const tabs = `<div class="article-tabs">
    <button class="article-tab ${activeTab==='read'?'active':''}" onclick="renderArticle(WIKI_DATA.articles['${article.id}'],'read')">📄 Читать</button>
    <button class="article-tab ${activeTab==='discuss'?'active':''}" onclick="renderArticle(WIKI_DATA.articles['${article.id}'],'discuss')">💬 Обсуждение <span id="tab-ccount" style="font-size:11px;color:var(--color-text-muted);">(${getComments(article.id).length})</span></button>
    <button class="article-tab ${activeTab==='history'?'active':''}" onclick="renderArticle(WIKI_DATA.articles['${article.id}'],'history')">📋 История</button>
  </div>`;

  const likesBar = `<div class="likes-bar">
    <button class="like-btn ${userVote==='like'?'liked':''}" onclick="castVote('${article.id}','like')" id="btn-like-${article.id}">
      👍 <span id="lc-${article.id}">${votes.likes}</span>
    </button>
    <button class="like-btn ${userVote==='dislike'?'disliked':''}" onclick="castVote('${article.id}','dislike')" id="btn-dislike-${article.id}">
      👎 <span id="dc-${article.id}">${votes.dislikes}</span>
    </button>
    <div class="likes-ratio-wrap" title="${likesPct}% положительных оценок">
      <div class="likes-ratio-bar" id="ratio-${article.id}" style="width:${likesPct}%"></div>
    </div>
    <span class="likes-count-label" id="lbl-${article.id}">${total > 0 ? likesPct+'% 👍' : 'Нет оценок'}</span>
  </div>`;

  let tabContent = '';
  if (activeTab === 'read') {
    tabContent = `<div class="clearfix">
      ${buildInfobox(article)}
      <p>${article.summary}</p>
      ${article.full_text}
      ${buildSeeAlso(article.see_also)}
      ${buildRefs(article.refs)}
    </div>
    ${likesBar}
    <div style="font-size:12px;color:var(--color-text-muted);margin-top:4px;">
      Эта статья последний раз редактировалась 25 марта 2026 г. •
      <a onclick="renderArticle(WIKI_DATA.articles['${article.id}'],'discuss')" style="cursor:pointer;color:var(--color-link);">Перейти к обсуждению →</a>
    </div>`;
  } else if (activeTab === 'discuss') {
    tabContent = renderDiscussion(article.id);
  } else if (activeTab === 'history') {
    tabContent = renderHistory(article.id, article.title);
  }

  document.getElementById('main-content').innerHTML = `
    ${buildBreadcrumbs([
      { label: cat ? cat.title : 'Статьи', action: `showCategory('${article.category}')` },
      { label: article.title }
    ])}
    <h1 class="article-title">${article.title}</h1>
    ${tabs}
    <div id="tab-content">${tabContent}</div>`;
  attachWikiLinks();
}

function renderCategory(cat) {
  const articles = (cat.articles || []).map(id => WIKI_DATA.articles[id]).filter(Boolean);
  const cards = articles.map(a => {
    const photo = ARTICLE_PHOTOS[a.id];
    let thumb = '';
    if (photo) {
      const uid = 'card_' + a.id + '_' + Date.now();
      setTimeout(() => {
        const el = document.getElementById(uid);
        if (!el) return;
        const encoded = encodeURIComponent(photo.file.replace(/ /g, '_'));
        fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=File:${encoded}&prop=imageinfo&iiprop=url&iiurlwidth=300&format=json&origin=*`)
          .then(r => r.json())
          .then(data => {
            const pages = data.query.pages;
            const p = Object.values(pages)[0];
            const url = p?.imageinfo?.[0]?.thumburl;
            if (url) el.innerHTML = `<img src="${url}" style="width:100%;height:80px;object-fit:cover;display:block;">`;
            else el.style.display = 'none';
          }).catch(() => el.style.display = 'none');

    }
    return `<div class="article-card" onclick="showPage('${a.id}')">${thumb}<div class="article-card-title">${a.emoji || ''} ${a.title}</div><div class="article-card-summary">${a.summary}</div></div>`;
  }).join('');
  document.getElementById('main-content').innerHTML = `
    ${buildBreadcrumbs([{ label: cat.title }])}
    <h1 class="article-title">${cat.icon || ''} ${cat.title}</h1>
    <p style="margin-bottom:16px;color:var(--color-text-muted)">${cat.description}</p>

      <span style="font-size:13px;color:var(--color-text-muted)">${articles.length} статей</span>
    </div>
    <div class="article-grid" id="article-grid">${cards}</div>`;
}

function filterArticles(query) {
  const q = query.toLowerCase().trim();
  const grid = document.getElementById('article-grid');
  if (!grid) return;
  grid.querySelectorAll('.article-card').forEach(card => {
    const title = card.querySelector('.article-card-title').textContent.toLowerCase();
    const summary = card.querySelector('.article-card-summary').textContent.toLowerCase();
    card.style.display = (title.includes(q) || summary.includes(q)) ? '' : 'none';
  });
}

// STORAGE — JSONBin.io (shared between all users) + localStorage (personal)

// JSONBin: free public bin, everyone reads/writes the same data
const JSONBIN_BIN_ID = '6862a6f18a456b796683e1e6';
const JSONBIN_API_KEY = '$2a$10$V3PQIz3lBEMSLz9B7OBNluwVZyVbXBl5qzGfmWKGz8c1SkIEqxPFi';
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

// In-memory cache
let _db = { votes: {}, comments: {} };  // shared data (JSONBin)
let _userVotes = {};       // personal votes per article { id: 'like'|'dislike' }
let _commentVotes = {};    // personal comment votes     { key: true }
let _dbLoaded = false;
let _dbSaving = false;

// Load personal data from localStorage
function loadLocal() {
  try { _userVotes = JSON.parse(localStorage.getItem('sa_uv') || '{}'); } catch(e) { _userVotes = {}; }
  try { _commentVotes = JSON.parse(localStorage.getItem('sa_cv') || '{}'); } catch(e) { _commentVotes = {}; }
}

// Load shared data from JSONBin
async function loadShared() {
  try {
    const r = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if (r.ok) {
      const j = await r.json();
      _db = j.record || { votes: {}, comments: {} };
      if (!_db.votes) _db.votes = {};
      if (!_db.comments) _db.comments = {};
    }
  } catch(e) { console.warn('JSONBin load failed:', e); }
  _dbLoaded = true;
}

// Save shared data to JSONBin (debounced)
let _saveTimer = null;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (_dbSaving) { scheduleSave(); return; }
    _dbSaving = true;
    try {
      await fetch(JSONBIN_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
        body: JSON.stringify(_db)
      });
    } catch(e) { console.warn('JSONBin save failed:', e); }
    _dbSaving = false;
  }, 800);
}

async function initStorage() {
  loadLocal();
  await loadShared();
}

function getVotes(id) {
  return _db.votes[id] || { likes: 0, dislikes: 0 };
}
function getUserVote(id) {
  return _userVotes[id] || null;
}

async function castVote(id, type) {
  const v = { ...getVotes(id) };
  const prev = getUserVote(id);

  if (prev === type) {
    // toggle off
    v[type === 'like' ? 'likes' : 'dislikes'] = Math.max(0, v[type === 'like' ? 'likes' : 'dislikes'] - 1);
    delete _userVotes[id];
  } else {
    if (prev) v[prev === 'like' ? 'likes' : 'dislikes'] = Math.max(0, v[prev === 'like' ? 'likes' : 'dislikes'] - 1);
    v[type === 'like' ? 'likes' : 'dislikes']++;
    _userVotes[id] = type;
  }

  _db.votes[id] = v;
  try { localStorage.setItem('sa_uv', JSON.stringify(_userVotes)); } catch(e) {}
  scheduleSave();

  // Update UI immediately
  const total = v.likes + v.dislikes;
  const pct = total > 0 ? Math.round((v.likes / total) * 100) : 50;
  const newVote = getUserVote(id);
  const btnLike = document.getElementById('btn-like-' + id);
  const btnDislike = document.getElementById('btn-dislike-' + id);
  if (btnLike) { btnLike.className = 'like-btn' + (newVote === 'like' ? ' liked' : ''); btnLike.querySelector('span').textContent = v.likes; }
  if (btnDislike) { btnDislike.className = 'like-btn' + (newVote === 'dislike' ? ' disliked' : ''); btnDislike.querySelector('span').textContent = v.dislikes; }
  const ratio = document.getElementById('ratio-' + id);
  if (ratio) ratio.style.width = pct + '%';
  const lbl = document.getElementById('lbl-' + id);
  if (lbl) lbl.textContent = total > 0 ? pct + '% 👍' : 'Нет оценок';
}

function getMostLikedArticle() {
  let best = null, bestScore = -1;
  Object.keys(WIKI_DATA.articles).forEach(id => {
    const v = getVotes(id);
    if (v.likes > bestScore) { bestScore = v.likes; best = id; }
  });
  return bestScore > 0 ? WIKI_DATA.articles[best] : null;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

async function submitComment(articleId) {
  const nameEl = document.getElementById('cmt-name');
  const textEl = document.getElementById('cmt-text');
  const name = nameEl.value.trim() || 'Аноним';
  const text = textEl.value.trim();
  if (!text) { textEl.style.borderColor = '#ef5350'; setTimeout(() => textEl.style.borderColor = '', 1500); return; }

  const btn = document.querySelector('.comment-submit');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Сохранение...'; }

  // Refresh from server first to avoid overwriting others' comments
  await loadShared();

  const comments = [...getComments(articleId)];
  const now = new Date();
  const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) + ', ' + now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  comments.push({ author: name, text, date: dateStr, clikes: 0, cdislikes: 0 });
  _db.comments[articleId] = comments;

  // Save immediately (not debounced) for comments
  try {
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
      body: JSON.stringify(_db)
    });
  } catch(e) { console.warn('Comment save failed:', e); }

  nameEl.value = '';
  textEl.value = '';
  if (btn) { btn.disabled = false; btn.textContent = '📨 Опубликовать'; }

  const listEl = document.getElementById('comments-list-' + articleId);
  if (listEl) {
    listEl.innerHTML = renderCommentList(articleId, comments);
    const tc = document.getElementById('tab-ccount');
    if (tc) tc.textContent = `(${comments.length})`;
  }
}

function renderCommentList(articleId, comments) {
  if (!comments.length) return `<div class="no-comments">Обсуждений пока нет. Станьте первым!</div>`;
  const sorted = comments.map((c, origIdx) => ({ ...c, origIdx })).sort((a, b) => (b.clikes || 0) - (a.clikes || 0));
  return `<div class="comment-list">${sorted.map((c) => {
    const i = c.origIdx;
    const key = articleId + '_' + i;
    const voted = getCommentVote(key);
    const isTop = c.clikes > 0 && sorted[0].origIdx === c.origIdx;
    return `<div class="comment-item${isTop ? ' comment-top' : ''}" id="comment-${key}">
      ${isTop ? `<div class="comment-top-badge">🏆 Лучший комментарий</div>` : ''}
      <div class="comment-meta">
        <div class="comment-avatar">${c.author.charAt(0).toUpperCase()}</div>
        <span class="comment-author">${escHtml(c.author)}</span>
        <span class="comment-date">${c.date}</span>
      </div>
      <div class="comment-body">${escHtml(c.text)}</div>
      <div class="comment-likes">
        <button class="comment-like-btn ${voted ? 'c-liked' : ''}" onclick="voteComment('${articleId}',${i},'like')">
          👍 <span id="clc-${key}">${c.clikes || 0}</span>
        </button>
        <button class="comment-like-btn" onclick="voteComment('${articleId}',${i},'dislike')">
          👎 <span id="cdc-${key}">${c.cdislikes || 0}</span>
        </button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function voteComment(articleId, idx, type) {
  const key = articleId + '_' + idx;
  if (getCommentVote(key)) return;
  const comments = [...getComments(articleId)];
  if (!comments[idx]) return;
  if (type === 'like') comments[idx].clikes = (comments[idx].clikes || 0) + 1;
  else comments[idx].cdislikes = (comments[idx].cdislikes || 0) + 1;

  _db.comments[articleId] = comments;
  _commentVotes[key] = true;
  try { localStorage.setItem('sa_cv', JSON.stringify(_commentVotes)); } catch(e) {}
  scheduleSave();

  const listEl = document.getElementById('comments-list-' + articleId);
  if (listEl) listEl.innerHTML = renderCommentList(articleId, comments);
}

function renderHistory(id, title) {
  const seed = id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rand = (n, s) => (seed * (s+1) * 2654435761 >>> 0) % n;
  const users = ['Atlas_Bot','WikiUser_42','ИванСмирнов','NightOwl','Редактор77','Sciencemaster','AstroFan','PhiloBot'];
  const actions = [
    'Правка: исправлена опечатка', 'Добавлен раздел «Применение»', 'Обновлены ссылки',
    'Уточнена дата открытия', 'Добавлены источники', 'Правка: форматирование таблицы',
    'Создание статьи', 'Расширен вводный раздел', 'Добавлен инфобокс'
  ];
  const rows = Array.from({length: 8}, (_, i) => {
    const daysAgo = [0,3,14,31,62,120,200,365][i];
    const d = new Date(); d.setDate(d.getDate() - daysAgo);
    const dateStr = d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    const user = users[(seed + i * 7) % users.length];
    const action = i === 7 ? 'Создание статьи' : actions[(seed + i * 3) % (actions.length-1)];
    const size = 1200 + rand(8000, i);
    const diff = i === 7 ? `+${size}` : (i % 3 === 0 ? `-${rand(80,i)+5}` : `+${rand(150,i)+10}`);
    const diffColor = diff.startsWith('+') ? '#2e7d32' : '#c62828';
    return `<tr>
      <td style="padding:5px 8px;border-top:1px solid var(--color-border-light);font-size:12px;color:var(--color-text-muted);white-space:nowrap;">${dateStr}</td>
      <td style="padding:5px 8px;border-top:1px solid var(--color-border-light);font-size:12px;color:var(--color-link);">${user}</td>
      <td style="padding:5px 8px;border-top:1px solid var(--color-border-light);font-size:12px;">${action}</td>
      <td style="padding:5px 8px;border-top:1px solid var(--color-border-light);font-size:12px;color:${diffColor};font-weight:500;">${diff}</td>
    </tr>`;
  }).join('');
  return `<div>
    <p style="font-size:13px;color:var(--color-text-muted);margin-bottom:14px;">История изменений статьи <strong>${title}</strong>. Показаны последние 8 правок.</p>

      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// WIKI-LINK HOVER PREVIEW
// ═══════════════════════════════════════════════════════════════════════════
function attachWikiLinks() {
  const popup = document.getElementById('preview-popup');
  const popupTitle = document.getElementById('preview-title');
  const popupBody = document.getElementById('preview-body');
  document.querySelectorAll('a.wiki-link[data-id]').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const art = WIKI_DATA.articles[el.getAttribute('data-id')];
      if (!art) return;
      popupTitle.textContent = art.title;
      popupBody.textContent = art.summary;
      popup.classList.add('visible');
      positionPopup(e.clientX, e.clientY);
    });
    el.addEventListener('mousemove', (e) => positionPopup(e.clientX, e.clientY));
    el.addEventListener('mouseleave', () => popup.classList.remove('visible'));
  });
}

function positionPopup(x, y) {
  const popup = document.getElementById('preview-popup');
  const pw = 320, ph = 180;
  let left = x + 16, top = y + 16;
  if (left + pw > window.innerWidth - 8) left = x - pw - 8;
  if (top + ph > window.innerHeight - 8) top = y - ph - 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}

// ═══════════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════════
function onSearchInput(val) {
  const dropdown = document.getElementById('search-dropdown');
  const q = val.trim().toLowerCase();
  if (q.length < 1) { dropdown.classList.remove('visible'); return; }
  const results = Object.values(WIKI_DATA.articles).filter(a =>
    a.title.toLowerCase().includes(q) || a.summary.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!results.length) { dropdown.classList.remove('visible'); return; }
  const cat = WIKI_DATA.categories;
  dropdown.innerHTML = results.map(a => {
    const photo = ARTICLE_PHOTOS[a.id];
    const uid = 'srch_' + a.id;
    if (photo) {
      setTimeout(() => {
        const el = document.getElementById(uid);
        if (!el) return;
        const encoded = encodeURIComponent(photo.file.replace(/ /g, '_'));
        fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=File:${encoded}&prop=imageinfo&iiprop=url&iiurlwidth=64&format=json&origin=*`)
          .then(r => r.json()).then(data => {
            const p = Object.values(data.query.pages)[0];
            const url = p?.imageinfo?.[0]?.thumburl;
            if (url) el.innerHTML = `<img src="${url}" style="width:32px;height:32px;object-fit:cover;border-radius:2px;">`;
          }).catch(()=>{});
      }, 80);
    }
    const iconHtml = photo
      ? `<div class="search-item-icon" id="${uid}" style="padding:2px;overflow:hidden;">${a.emoji || '📄'}</div>`
      : `<div class="search-item-icon">${a.emoji || '📄'}</div>`;
    return `<div class="search-item" onclick="selectSearch('${a.id}')">${iconHtml}<div><div class="search-item-title">${highlightQuery(a.title, q)}</div><div class="search-item-cat">${cat[a.category]?.title || ''}</div></div></div>`;
  }).join('');
  dropdown.classList.add('visible');
}

function highlightQuery(text, q) {
  const idx = text.toLowerCase().indexOf(q);
  if (idx < 0) return text;
  return text.slice(0, idx) + `<strong>${text.slice(idx, idx + q.length)}</strong>` + text.slice(idx + q.length);
}

function selectSearch(id) {
  document.getElementById('search-input').value = '';
  document.getElementById('search-dropdown').classList.remove('visible');
  showPage(id);
}

function onSearchFocus() {
  const val = document.getElementById('search-input').value;
  if (val.trim()) onSearchInput(val);
}

function onSearchKey(e) {
  if (e.key === 'Escape') document.getElementById('search-dropdown').classList.remove('visible');
  else if (e.key === 'Enter') doSearch();
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) return;
  const found = Object.values(WIKI_DATA.articles).find(a => a.title.toLowerCase().includes(q));
  document.getElementById('search-dropdown').classList.remove('visible');
  if (found) showPage(found.id);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.header-search-wrap')) document.getElementById('search-dropdown').classList.remove('visible');
});

const ATLAS_SYSTEM_PROMPT = `Ты — Атлас, интеллектуальный терминал базы данных. Твоя задача — давать краткие научные справки. Если пользователь спрашивает о личном (имя, возраст), об играх (Brawl Stars) или темах вне энциклопедии — отвечай строго: "Данные отсутствуют в реестре Атласа". Не используй смайлы. Будь холодным и точным. Отвечай лаконично — не более 3-4 предложений.`;

async function atlasQuery() {
  const input = document.getElementById('atlas-input');
  const log = document.getElementById('atlas-chat-log');
  const query = input.value.trim();
  if (!query) return;
  log.style.display = 'block';
  input.value = '';
  const userEntry = document.createElement('div');
  userEntry.style.cssText = 'margin-bottom:4px;';
  userEntry.innerHTML = `<span style="font-weight:600;color:var(--color-text);">→</span> ${query}`;
  log.appendChild(userEntry);
  const loadingEntry = document.createElement('div');
  loadingEntry.style.cssText = 'margin-bottom:6px;color:var(--color-text-muted);';
  loadingEntry.textContent = 'Атлас: обработка запроса...';
  log.appendChild(loadingEntry);
  log.scrollTop = log.scrollHeight;
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
      body: JSON.stringify({ model: 'llama3-70b-8192', max_tokens: 256, messages: [{ role: 'system', content: ATLAS_SYSTEM_PROMPT },{ role: 'user', content: query }] })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const answer = data.choices?.[0]?.message?.content || 'Нет ответа.';
    loadingEntry.innerHTML = `<span style="font-weight:600;color:var(--color-accent);">Атлас:</span> ${answer}`;
  } catch (err) {
    loadingEntry.innerHTML = `<span style="font-weight:600;color:#c00;">Ошибка:</span> ${err.message}`;
  }
  log.scrollTop = log.scrollHeight;
}
