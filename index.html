    agoraphobia: { id:'agoraphobia', title:'Агорафобия', category:'phobias', emoji:'🏟️', infobox:{'Классификация':'МКБ-11 F40.0','Тип':'Фобическое тревожное расстройство','Распространённость':'1,7–3,6% населения','Лечение':'КПТ, СИОЗС'}, summary:'Агорафобия — тревожное расстройство, характеризующееся выраженным и устойчивым страхом перед ситуациями, из которых, по убеждению пациента, трудно выбраться или получить помощь в случае паники.', full_text:`<p><strong>Агорафобия</strong> (от греч. <em>ἀγορά</em> — площадь + <em>φόβος</em> — страх) — клинически значимое тревожное расстройство, при котором человек испытывает интенсивный, иррациональный страх перед широким диапазоном открытых или многолюдных пространств. В тяжёлых случаях пациент полностью отказывается покидать жилище.<sup>[1]</sup></p><div class="article-section"><h2 class="section-h2">Лечение</h2><p>Наиболее эффективным методом признана когнитивно-поведенческая терапия (КПТ) с компонентом постепенной экспозиции. Медикаментозная поддержка СИОЗС применяется при умеренной и тяжёлой степени выраженности.</p></div>`, see_also:['claustrophobia','social_phobia'], refs:['Вестфаль К. Ф. О., 1871.','American Psychiatric Association. DSM-5-TR, 2022.'] },
    nyctophobia: { id:'nyctophobia', title:'Никтофобия', category:'phobias', emoji:'🌑', infobox:{'Классификация':'МКБ-11 F40.2','Распространённость':'~11% взрослых'}, summary:'Никтофобия — специфическая фобия, выражающаяся в устойчивом страхе темноты или ночного времени суток.', full_text:`<p><strong>Никтофобия</strong> — специфическое фобическое расстройство, при котором темнота становится триггером интенсивной тревожной реакции.</p>`, see_also:['agoraphobia','thalassophobia'], refs:['Muris P. et al. J. Anxiety Disorders, 2001.'] },
    thalassophobia: { id:'thalassophobia', title:'Таласофобия', category:'phobias', emoji:'🌊', infobox:{'Тип':'Специфическая фобия','Объект':'Глубокие водоёмы'}, summary:'Таласофобия — специфическое фобическое расстройство, характеризующееся устойчивым страхом перед открытыми или глубокими водными пространствами.', full_text:`<p><strong>Таласофобия</strong> (от греч. <em>θάλασσα</em> — море) — расстройство тревожного спектра, при котором объектом страха выступает пространство водной толщи: её глубина, непрозрачность и бесконечность.</p>`, see_also:['nyctophobia','apeirophobia'], refs:['Davey G. Phobias. Wiley, 1997.'] },
    arachnophobia: { id:'arachnophobia', title:'Арахнофобия', category:'phobias', emoji:'🕷️', infobox:{'Распространённость':'~5%','Пол':'Чаще у женщин (3:1)'}, summary:'Арахнофобия — одна из наиболее распространённых специфических фобий, выражающаяся в страхе перед паукообразными. Относится к биологически подготовленным страхам.', full_text:`<p><strong>Арахнофобия</strong> — специфическая фобия, характеризующаяся интенсивным, иррациональным страхом перед всеми представителями класса паукообразных.</p>`, see_also:['nyctophobia','social_phobia'], refs:['Seligman M.E.P. Behavior Therapy, 1971.'] },
    claustrophobia: { id:'claustrophobia', title:'Клаустрофобия', category:'phobias', emoji:'📦', infobox:{'Распространённость':'2–5%','Триггер':'Замкнутые пространства'}, summary:'Клаустрофобия — специфическое фобическое расстройство, при котором объектом страха являются замкнутые пространства. Особое клиническое значение имеет в медицинском контексте.', full_text:`<p><strong>Клаустрофобия</strong> — специфическая фобия, при которой замкнутые пространства вызывают интенсивную тревожную реакцию.</p>`, see_also:['agoraphobia','thalassophobia'], refs:['Morel B.A. 1879.'] },
    social_phobia: { id:'social_phobia', title:'Социальное тревожное расстройство', category:'phobias', emoji:'👥', infobox:{'Классификация':'МКБ-11 6B04','Распространённость':'7–13%'}, summary:'Социальное тревожное расстройство — одно из наиболее распространённых тревожных расстройств, характеризующееся интенсивным страхом социальных ситуаций.', full_text:`<p><strong>Социальное тревожное расстройство</strong> — тревожное расстройство, при котором социальные ситуации вызывают несоразмерный страх быть негативно оценённым.</p>`, see_also:['agoraphobia','xenodigital'], refs:['Clark D.M., Wells A. Guilford Press, 1995.'] },
    obsoletophobia: { id:'obsoletophobia', title:'Обсолитофобия', category:'phobias', emoji:'💾', infobox:{'Статус':'Описательный концепт','Тип':'Цифровая фобия'}, summary:'Обсолитофобия — описательный концепт, обозначающий устойчивый страх перед устареванием технологий, устройств и программного обеспечения.', full_text:`<p><strong>Обсолитофобия</strong> — описательный концепт, обозначающий тревожное состояние, вызванное страхом оказаться позади стремительно развивающегося технологического прогресса.</p>`, see_also:['cybernophobia','algorithmophobia'], refs:['Brod C. Technostress. 1984.'] },
    cybernophobia: { id:'cybernophobia', title:'Киберофобия', category:'phobias', emoji:'🤖', infobox:{'Тип':'Цифровая фобия'}, summary:'Киберофобия — устойчивый страх перед компьютерами, автоматизированными системами и искусственным интеллектом.', full_text:`<p><strong>Киберофобия</strong> — тревожное расстройство или устойчивое негативное отношение к компьютерам, цифровым сетям и автоматизированным системам.</p>`, see_also:['obsoletophobia','algorithmophobia'], refs:['Rosen L.D., Weil M.M. 1995.'] },
    algorithmophobia: { id:'algorithmophobia', title:'Алгоритмофобия', category:'phobias', emoji:'⚙️', infobox:{'Статус':'Нарождающийся концепт'}, summary:'Алгоритмофобия — концепт, описывающий тревожные реакции на непрозрачность алгоритмических систем принятия решений.', full_text:`<p><strong>Алгоритмофобия</strong> — описательный психологический концепт, обозначающий тревожные реакции в ответ на непрозрачную логику автоматизированного принятия решений.</p>`, see_also:['cybernophobia','resonophobia'], refs:['Eubanks V. Automating Inequality. 2018.'] },
    xenodigital: { id:'xenodigital', title:'Ксенодигитальная фобия', category:'phobias', emoji:'👾', infobox:{'Статус':'Авторский концепт'}, summary:'Ксенодигитальная фобия — описательный концепт, обозначающий страх перед чужой цифровой идентичностью и онлайн-репутацией.', full_text:`<p><strong>Ксенодигитальная фобия</strong> — авторский концепт, охватывающий тревожные реакции при столкновении с «чужой» цифровой идентичностью в онлайн-пространстве.</p>`, see_also:['social_phobia','cybernophobia'], refs:['Festinger L. Human Relations, 1954.'] },
    googolophobia: { id:'googolophobia', title:'Гугол-фобия', category:'phobias', emoji:'🔢', infobox:{'Тип':'Математическая фобия'}, summary:'Гугол-фобия — описательный концепт, обозначающий когнитивно-тревожную реакцию при столкновении с несоизмеримо большими конечными числами.', full_text:`<p><strong>Гугол-фобия</strong> — неформальный описательный концепт, обозначающий особую форму когнитивной тревоги при столкновении с числами настолько большими, что человеческий мозг не способен интуитивно охватить их величину.</p>`, see_also:['apeirophobia','infinitophobia'], refs:['Dehaene S. The Number Sense. 1997.'] },
    apeirophobia: { id:'apeirophobia', title:'Апейрофобия', category:'phobias', emoji:'♾️', infobox:{'Тип':'Экзистенциальная фобия'}, summary:'Апейрофобия — экзистенциально-когнитивная форма тревоги, вызванная осмыслением концепта бесконечности.', full_text:`<p><strong>Апейрофобия</strong> — экзистенциальная фобия, при которой тревогу вызывает абстрактный концепт бесконечности — бесконечного пространства, времени или чисел.</p>`, see_also:['infinitophobia','googolophobia'], refs:['Yalom I. Existential Psychotherapy. 1980.'] },
    infinitophobia: { id:'infinitophobia', title:'Инфинитофобия', category:'phobias', emoji:'∞', infobox:{'Статус':'Авторский концепт'}, summary:'Инфинитофобия — авторский концепт, описывающий страх перед самим процессом бесконечного: регрессией, циклом, неисчерпаемым множеством.', full_text:`<p><strong>Инфинитофобия</strong> — авторский психологический концепт для разграничения страха перед бесконечностью как состоянием (апейрофобия) и страха перед бесконечностью как процессом.</p>`, see_also:['apeirophobia','googolophobia'], refs:['Wells A. Metacognitive Therapy. 2009.'] },
    resonophobia: { id:'resonophobia', title:'Резонофобия', category:'phobias', emoji:'🔊', infobox:{'Статус':'Авторский концепт'}, summary:'Резонофобия — авторский концепт, описывающий тревогу, вызванную ощущением, что смыслы и идеи «отражаются» бесконечно.', full_text:`<p><strong>Резонофобия</strong> — авторский психологический концепт, описывающий особую форму когнитивной тревоги, при которой мышление застревает в бесконечных «отражениях» смысла.</p>`, see_also:['echo_syndrome','algorithmophobia'], refs:['Derrida J. De la grammatologie. 1967.'] },
    echo_syndrome: { id:'echo_syndrome', title:'Эхо-синдром', category:'phobias', emoji:'🔁', infobox:{'Статус':'Авторский концепт','Контекст':'Социальные сети'}, summary:'Эхо-синдром — авторский концепт, описывающий когнитивно-тревожное состояние, при котором человек осознаёт, что его мнения сформированы алгоритмически подобранным информационным эхом.', full_text:`<p><strong>Эхо-синдром</strong> — авторский психологический концепт, описывающий специфическую форму когнитивного дистресса, при которой субъект осознаёт, что его убеждения сформированы информационным пузырём.</p>`, see_also:['resonophobia','algorithmophobia'], refs:['Pariser E. The Filter Bubble. 2011.'] },

    // ─── НАУКА ─────────────────────────────────────────────────────────────
    quantum_computing: { id:'quantum_computing', title:'Квантовые вычисления', category:'science', emoji:'⚛️', infobox:{'Основоположники':'Манин, Фейнман, Дойч','Первый алгоритм':'Шора (1994)'}, summary:'Квантовые вычисления — парадигма вычислений, использующая принципы квантовой механики для обработки информации принципиально новым способом.', full_text:`<p><strong>Квантовые вычисления</strong> — область вычислительной науки, в которой информация кодируется в квантовых системах (кубитах) и обрабатывается с применением суперпозиции, запутанности и интерференции.</p>`, see_also:['agi','blockchain'], refs:['Feynman R.P. Int. J. Theor. Phys., 1982.','Shor P. SIAM J. Comput., 1997.'] },
    agi: { id:'agi', title:'Искусственный общий интеллект', category:'science', emoji:'🧠', infobox:{'Акроним':'ИОИ / AGI','Статус':'Не достигнут (2026)'}, summary:'Искусственный общий интеллект (AGI) — гипотетическая система ИИ, обладающая общими когнитивными способностями, сопоставимыми с человеческими или превосходящими их.', full_text:`<p><strong>Искусственный общий интеллект</strong> — тип гипотетической интеллектуальной системы, способной выполнять любую интеллектуальную задачу, доступную человеку.</p>`, see_also:['quantum_computing','cybernophobia'], refs:['Turing A.M. Mind, 1950.','Bostrom N. Superintelligence. 2014.'] },

    // ─── КОСМОС ────────────────────────────────────────────────────────────
    solar_system: {
      id: 'solar_system', title: 'Солнечная система', category: 'space', emoji: '☀️',
      infobox: { 'Тип':'Планетная система','Звезда':'Солнце (G2V)','Возраст':'≈4,568 млрд лет','Число планет':'8 (МАС, 2006)','Диаметр':'≈2 св. года','Ближайший сосед':'α Центавра (4,22 св. лет)' },
      summary: 'Солнечная система — гравитационно связанная система, состоящая из Солнца и всех объектов, обращающихся вокруг него: восьми планет, карликовых планет, астероидов, комет и межпланетного вещества.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#origin">Происхождение</a></li><li><a href="#sun">Солнце</a></li><li><a href="#planets">Планеты</a></li><li><a href="#small_bodies">Малые тела</a></li></ol></div>
<p><strong>Солнечная система</strong> — планетарная система в рукаве Ориона Млечного Пути на расстоянии около 26 000 световых лет от галактического центра. Общая масса системы на 99,86% сосредоточена в Солнце.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="origin">Происхождение и формирование</h2><p>Согласно небулярной гипотезе, Солнечная система сформировалась 4,568 миллиарда лет назад из вращающегося газопылевого облака — протосолнечной туманности. Гравитационный коллапс центральной области дал начало Солнцу, тогда как периферийный диск аккрецировал в планеты.</p></div>
<div class="article-section"><h2 class="section-h2" id="sun">Солнце</h2><p>Солнце — звезда класса G2V возрастом 4,6 млрд лет. В его недрах протекает термоядерная реакция синтеза гелия из водорода, высвобождающая 3,8 × 10²⁶ ватт энергии. Через ≈5 млрд лет Солнце превратится в <a class="wiki-link" onclick="showPage('white_dwarfs')" data-id="white_dwarfs">белый карлик</a>.</p></div>
<div class="article-section"><h2 class="section-h2" id="planets">Планеты</h2><p>По классификации МАС (2006) выделяют 8 планет: Меркурий, Венера, Земля, Марс (планеты земной группы) и Юпитер, Сатурн (газовые гиганты), Уран, Нептун (ледяные гиганты).</p></div>
<div class="article-section"><h2 class="section-h2" id="small_bodies">Малые тела</h2><p>Пояс астероидов между Марсом и Юпитером содержит сотни тысяч тел. Пояс Койпера и облако Оорта являются резервуарами комет.</p></div>`,
      see_also: ['black_holes','pulsars','neutron_stars'],
      refs: ['Williams D.R. Planetary Fact Sheets. NASA, 2023.','IAU Resolution B5. Prague, 2006.']
    },

    black_holes: {
      id: 'black_holes', title: 'Чёрные дыры', category: 'space', emoji: '⚫',
      infobox: { 'Предсказаны':'Шварцшильд, 1916','Первое изображение':'EHT, 2019 (M87*)','Типы':'Стелл., промеж., сверхмасс.','Мин. масса':'≈3 M☉' },
      summary: 'Чёрная дыра — область пространства-времени с настолько интенсивным гравитационным полем, что ни вещество, ни электромагнитное излучение не могут её покинуть. Граница этой области называется горизонтом событий.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#history">История</a></li><li><a href="#types">Типы</a></li><li><a href="#hawking">Излучение Хокинга</a></li><li><a href="#observation">Наблюдение</a></li></ol></div>
<p><strong>Чёрная дыра</strong> — астрофизический объект, предсказанный общей теорией относительности, в котором вторая космическая скорость превышает скорость света.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="history">История открытия</h2><p>Карл Шварцшильд в 1916 году получил первое точное решение уравнений Эйнштейна. Термин «чёрная дыра» введён Джоном Уилером в 1967 году.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="types">Типы чёрных дыр</h2><h3 class="section-h3">Звёздные</h3><p>Образуются при гравитационном коллапсе массивных звёзд после <a class="wiki-link" onclick="showPage('supernovae')" data-id="supernovae">сверхновой</a>. Масса — от ≈3 до нескольких десятков M☉.</p><h3 class="section-h3">Сверхмассивные</h3><p>Находятся в центрах большинства галактик. Именно сверхмассивные чёрные дыры питают <a class="wiki-link" onclick="showPage('quasars')" data-id="quasars">квазары</a> и <a class="wiki-link" onclick="showPage('blazars')" data-id="blazars">блазары</a>.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="hawking">Излучение Хокинга</h2><p>В 1974 году Стивен Хокинг теоретически показал, что чёрные дыры постепенно испаряются вследствие квантовых флуктуаций вблизи горизонта событий.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="observation">Первое изображение</h2><p>Телескоп EHT в апреле 2019 года получил первое изображение тени чёрной дыры M87* (масса 6,5 × 10⁹ M☉). В 2022 году опубликовано изображение Стрельца A* — чёрной дыры в центре Млечного Пути.</p></div>`,
      see_also: ['neutron_stars','quasars','supernovae'],
      refs: ['Schwarzschild K. Sitzungsber. Preuss. Akad. Wiss., 1916.','Wheeler J.A. American Scholar, 1968.','Gravity Collaboration. ApJL, 2019.','Hawking S.W. Nature, 1974.']
    },

    neutron_stars: {
      id: 'neutron_stars', title: 'Нейтронные звёзды', category: 'space', emoji: '💫',
      infobox: { 'Тип':'Компактный звёздный остаток','Масса':'1,4–3 M☉','Радиус':'≈10–12 км','Плотность':'≈10¹⁴ г/см³','Происхождение':'Коллапс при сверхновой','Подтипы':'Пульсары, магнетары' },
      summary: 'Нейтронная звезда — компактный звёздный остаток, образующийся в результате гравитационного коллапса ядра массивной звезды при взрыве сверхновой. Является одним из наиболее экзотических объектов во Вселенной по соотношению плотности и размера.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#formation">Образование</a></li><li><a href="#structure">Строение</a></li><li><a href="#subtypes">Подтипы</a></li><li><a href="#observation">Наблюдение</a></li></ol></div>
<p><strong>Нейтронная звезда</strong> — сверхплотный объект размером с небольшой город, но с массой, превосходящей массу Солнца в 1,4–2,3 раза. Плотность в её центре достигает нескольких ядерных плотностей, что делает нейтронные звёзды природными лабораториями экстремальной физики.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="formation">Образование</h2><p>Нейтронные звёзды возникают при взрывах <a class="wiki-link" onclick="showPage('supernovae')" data-id="supernovae">сверхновых</a> типа II (коллапс ядра). Когда ядро звезды с массой 1,4–3 M☉ сжимается до радиуса ~10 км, протоны и электроны под давлением объединяются в нейтроны. Если масса ядра превышает предел Толмена–Оппенгеймера–Волкова (~3 M☉), образуется <a class="wiki-link" onclick="showPage('black_holes')" data-id="black_holes">чёрная дыра</a>.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="structure">Строение</h2><p>Нейтронная звезда состоит из нескольких слоёв: тонкой внешней коры из обычной ядерной материи, плотной внутренней коры, внешнего ядра (нейтронная жидкость) и, вероятно, гиперонного или кваркового ядра в центре. Точный состав центрального ядра остаётся нерешённой проблемой теоретической физики.<sup>[3]</sup></p>
<div class="note-box">💡 <strong>Факт:</strong> Чайная ложка вещества нейтронной звезды весила бы около 100 миллионов тонн на Земле.</div></div>
<div class="article-section"><h2 class="section-h2" id="subtypes">Подтипы нейтронных звёзд</h2><p>Существует несколько ключевых подтипов в зависимости от наблюдаемых свойств: <a class="wiki-link" onclick="showPage('pulsars')" data-id="pulsars">пульсары</a> — быстро вращающиеся нейтронные звёзды, испускающие радиолучи; <a class="wiki-link" onclick="showPage('magnetars')" data-id="magnetars">магнетары</a> — нейтронные звёзды с экстремально сильным магнитным полем; миллисекундные пульсары — пульсары, «раскрученные» аккрецией вещества от звезды-компаньона.</p></div>
<div class="article-section"><h2 class="section-h2" id="observation">Наблюдение</h2><p>Гравитационно-волновое событие GW170817 (2017) — первое прямое наблюдение слияния двух нейтронных звёзд — открыло эру многоканальной астрономии. Событие сопровождалось гамма-всплеском и килоновой — взрывом, синтезирующим тяжёлые элементы (золото, платину, уран).<sup>[4]</sup></p></div>`,
      see_also: ['pulsars','magnetars','black_holes','supernovae'],
      refs: ['Baym G. et al. Neutron star structure. Astrophys. J., 1971.','Oppenheimer J.R., Volkoff G.M. Phys. Rev., 1939.','Lattimer J.M., Prakash M. Science, 2004.','Abbott B.P. et al. GW170817. Phys. Rev. Lett., 2017.']
    },

    pulsars: {
      id: 'pulsars', title: 'Пульсары', category: 'space', emoji: '📡',
      infobox: { 'Тип':'Вращающаяся нейтронная звезда','Открыты':'Белл и Хьюиш, 1967','Период вращения':'1,4 мс — 8,5 с','Первый пульсар':'PSR B1919+21','Нобелевская премия':'Хьюиш, 1974','Число известных':'> 3300 (2024)' },
      summary: 'Пульсар — быстро вращающаяся нейтронная звезда, испускающая узконаправленные потоки электромагнитного излучения из магнитных полюсов. Наблюдатель, находящийся на пути луча, регистрирует строго периодические импульсы, подобные космическому «маяку».',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#discovery">Открытие</a></li><li><a href="#mechanism">Механизм излучения</a></li><li><a href="#types">Типы пульсаров</a></li><li><a href="#applications">Применение</a></li></ol></div>
<p><strong>Пульсар</strong> (от англ. <em>pulsating radio source</em> — пульсирующий радиоисточник) — нейтронная звезда с несовпадающими осями вращения и магнитного диполя, что создаёт эффект «космического маяка». При каждом обороте луч излучения проходит через наблюдателя, порождая строго периодический сигнал.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="discovery">Открытие</h2><p>В 1967 году аспирантка Джослин Белл и её научный руководитель Энтони Хьюиш при обзоре неба радиотелескопом в Кембридже обнаружили чрезвычайно регулярный радиосигнал с периодом 1,337 секунды — PSR B1919+21. Первоначально объект получил шутливое обозначение LGM-1 (<em>Little Green Men</em>), поскольку учёные не исключали искусственного происхождения сигнала. Природа объекта была выяснена вскоре: это оказалась вращающаяся нейтронная звезда. В 1974 году Хьюиш получил Нобелевскую премию по физике (Белл, к сожалению, в список лауреатов включена не была, что вызвало значительную дискуссию в научном сообществе).<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="mechanism">Механизм излучения</h2><p>Нейтронная звезда обладает сверхсильным магнитным полем (10⁸–10¹² Тл). Заряженные частицы ускоряются вдоль магнитных силовых линий и испускают синхротронное излучение в виде узкого конуса из каждого магнитного полюса. Поскольку магнитная ось наклонена к оси вращения, луч периодически проходит мимо наблюдателя. Вращение пульсара постепенно замедляется из-за потерь энергии на магнитодипольное излучение.<sup>[3]</sup></p>
<div class="note-box">⏱️ <strong>Точность:</strong> Миллисекундные пульсары являются одними из самых точных «часов» во Вселенной — их стабильность сравнима со стабильностью атомных часов.</div></div>
<div class="article-section"><h2 class="section-h2" id="types">Типы пульсаров</h2><h3 class="section-h3">Обычные пульсары</h3><p>Период вращения от долей секунды до нескольких секунд. Постепенно тормозятся. Возраст — тысячи–миллионы лет.</p><h3 class="section-h3">Миллисекундные пульсаров</h3><p>Период менее 30 мс. «Переработанные» пульсары, раскрученные аккрецией вещества от звезды-компаньона в двойной системе. Отличаются исключительной стабильностью.</p><h3 class="section-h3">Двойные пульсары</h3><p>Знаменитая система PSR B1913+16 (Халс и Тейлор, 1974) позволила впервые косвенно подтвердить существование гравитационных волн — орбитальный период системы уменьшается точно с темпом, предсказанным ОТО. Это принесло Халсу и Тейлору Нобелевскую премию 1993 года.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="applications">Применение</h2><p>Пульсарная навигация (<em>X-ray pulsar navigation</em>, XNAV) — перспективная система навигации для космических аппаратов, аналогичная GPS, но использующая рентгеновские импульсы пульсаров в качестве опорных маяков. Пульсары также используются для поиска гравитационных волн низкой частоты через пульсарные тайминговые решётки (PTA).</p></div>`,
      see_also: ['neutron_stars','magnetars','black_holes','supernovae'],
      refs: ['Hewish A. et al. Observation of a Rapidly Pulsating Radio Source. Nature, 1968.','Bell Burnell J. Petit Four. Annals of NYAS, 1977.','Gold T. Rotating Neutron Stars as the Origin of Pulsating Radio Sources. Nature, 1968.','Hulse R.A., Taylor J.H. Astrophys. J., 1975.']
    },

    magnetars: {
      id: 'magnetars', title: 'Магнетары', category: 'space', emoji: '🧲',
      infobox: { 'Тип':'Нейтронная звезда (подтип)','Магнитное поле':'10¹⁰–10¹¹ Тл','Период вращения':'1–12 с','Активная жизнь':'~10 000 лет','Известных объектов':'~30 (2024)','Первая теория':'Дункан и Томпсон, 1992' },
      summary: 'Магнетар — подтип нейтронной звезды с магнитным полем, в миллиарды раз превосходящим поле обычных нейтронных звёзд. Является источником самых мощных магнитных полей, известных во Вселенной, и порождает экзотические вспышки рентгеновского и гамма-излучения.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#discovery">История</a></li><li><a href="#field">Магнитное поле</a></li><li><a href="#flares">Вспышки магнетаров</a></li><li><a href="#frb">Связь с быстрыми радиовсплесками</a></li></ol></div>
<p><strong>Магнетар</strong> (от <em>magnetic</em> + <em>star</em>) — нейтронная звезда с магнитным полем порядка 10¹⁰–10¹¹ Тесла, что на четыре-пять порядков превосходит поле обычных <a class="wiki-link" onclick="showPage('pulsars')" data-id="pulsars">пульсаров</a>. Для сравнения: самое мощное постоянное магнитное поле, созданное в лабораторных условиях на Земле, не превышает 100 Тл.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="discovery">История открытия</h2><p>Теоретическая модель магнетара была предложена Робертом Дунканом и Кристофером Томпсоном в 1992 году. До этого были известны загадочные объекты — мягкие гамма-репитеры (SGR) и аномальные рентгеновские пульсары (AXP) — природа которых оставалась необъяснённой. Магнетарная модель единым образом объяснила оба феномена.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="field">Магнитное поле и его эффекты</h2><p>Сверхсильное магнитное поле оказывает экзотические квантовые эффекты на структуру вещества: атомы водорода вытягиваются в тонкие «нити» вдоль силовых линий. В такой среде скорость света становится анизотропной, а вакуум приобретает свойства двойного лучепреломления — явление, получившее название вакуумного двулучепреломления. В 2016 году этот эффект был впервые зафиксирован телескопом VLT у магнетара RX J1856.5−3754.<sup>[3]</sup></p>
<div class="note-box">⚡ <strong>Масштаб:</strong> Магнетар SGR 1806-20 27 декабря 2004 года выпустил вспышку, высвободившую за 0,2 секунды энергию, равную энергии излучения Солнца за 250 000 лет.</div></div>
<div class="article-section"><h2 class="section-h2" id="flares">Вспышки магнетаров</h2><p>Магнетары периодически испытывают «звёздные землетрясения» — перестройку кристаллической коры под воздействием магнитного напряжения. При этом высвобождается огромное количество рентгеновского и гамма-излучения. Крупнейшие события называются гигантскими вспышками (giant flares); они регистрируются из других галактик.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="frb">Связь с быстрыми радиовсплесками</h2><p>В апреле 2020 года от галактического магнетара SGR 1935+2154 был зарегистрирован быстрый радиовсплеск (FRB) одновременно с рентгеновской вспышкой. Это первое прямое свидетельство того, что магнетары являются, по крайней мере, одним из источников <a class="wiki-link" onclick="showPage('gamma_ray_bursts')" data-id="gamma_ray_bursts">загадочных FRB</a> — одной из самых интригующих астрофизических загадок XXI века.<sup>[5]</sup></p></div>`,
      see_also: ['neutron_stars','pulsars','gamma_ray_bursts'],
      refs: ['Duncan R.C., Thompson C. Astrophys. J., 1992.','Kouveliotou C. et al. Nature, 1998.','Mignani R.P. et al. Vacuum birefringence. MNRAS, 2017.','Palmer D.M. et al. Giant flare SGR 1806-20. Nature, 2005.','CHIME/FRB Collaboration. Nature, 2020.']
    },

    quasars: {
      id: 'quasars', title: 'Квазары', category: 'space', emoji: '✨',
      infobox: { 'Расшифровка':'Quasi-Stellar Radio Source','Открыты':'Шмидт, 1963','Природа':'Активное ядро галактики','Источник энергии':'Сверхмасс. чёрная дыра','Светимость':'До 10⁴² Вт','Красное смещение':'До z ≈ 7,6' },
      summary: 'Квазар — чрезвычайно яркое активное ядро удалённой галактики, питаемое энергией сверхмассивной чёрной дыры, поглощающей окружающее вещество. Является одним из самых энергетически мощных объектов во Вселенной.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#discovery">История открытия</a></li><li><a href="#mechanism">Механизм энерговыделения</a></li><li><a href="#jets">Релятивистские джеты</a></li><li><a href="#cosmology">Космологическое значение</a></li></ol></div>
<p><strong>Квазар</strong> (<em>quasar</em>, сокр. от <em>quasi-stellar radio source</em>) — активное ядро галактики (AGN), в котором сверхмассивная <a class="wiki-link" onclick="showPage('black_holes')" data-id="black_holes">чёрная дыра</a> аккрецирует вещество с чрезвычайно высокой скоростью, высвобождая колоссальное количество энергии. Квазары видны на расстояниях миллиардов световых лет и являются одними из самых ярких постоянных объектов во Вселенной.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="discovery">История открытия</h2><p>В конце 1950-х годов радиоастрономы обнаружили мощные радиоисточники, соответствующие точечным оптическим объектам — звёздообразным по внешнему виду. В 1963 году Мартен Шмидт расшифровал оптический спектр объекта 3C 273 и обнаружил, что красное смещение его спектральных линий соответствует z = 0,158, то есть объект находится на расстоянии около двух миллиардов световых лет. Это было революционное открытие: объект звёздного вида оказался ярче целых галактик.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="mechanism">Механизм энерговыделения</h2><p>Квазар питается аккреционным диском — сплющенной структурой горячего газа, спирально падающего на центральную чёрную дыру массой от 10⁶ до 10¹⁰ масс Солнца. Трение в диске разогревает вещество до температур от 10⁴ до 10⁸ Кельвин, заставляя его светиться от ультрафиолета до рентгена. КПД преобразования вещества в энергию составляет до 40% — несравненно больше, чем у термоядерного синтеза (~0,7%).<sup>[3]</sup></p>
<div class="note-box">🌟 <strong>Светимость:</strong> Квазар TON 618 (z = 2,22) в 660 триллионов раз ярче Солнца и содержит чёрную дыру массой 66 миллиардов M☉ — одну из крупнейших известных.</div></div>
<div class="article-section"><h2 class="section-h2" id="jets">Релятивистские джеты</h2><p>Многие квазары испускают коллимированные струи плазмы (джеты), разогнанные до скоростей, близких к скорости света. Джеты могут простираться на миллионы световых лет и являются мощными источниками синхротронного радиоизлучения. Когда джет направлен точно в сторону наблюдателя, квазар классифицируется как <a class="wiki-link" onclick="showPage('blazars')" data-id="blazars">блазар</a>.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="cosmology">Космологическое значение</h2><p>Поскольку квазары видны с огромных расстояний (самый далёкий — J0313-1806, z = 7,64, возраст Вселенной ~670 млн лет), они служат уникальными зондами ранней Вселенной. Квазары позволяют изучать распределение межгалактического водорода через «лес Лайман-альфа» и тестировать модели структурообразования в ранней Вселенной.<sup>[5]</sup></p></div>`,
      see_also: ['blazars','black_holes','galaxies','gamma_ray_bursts'],

      id: 'blazars', title: 'Блазары', category: 'space', emoji: '🔥',

      summary: 'Блазар — особый класс активных ядер галактик, у которых один из релятивистских джетов направлен практически точно в сторону наблюдателя. Из-за релятивистского усиления блазары являются одними из самых ярких и переменных объектов в наблюдаемой Вселенной.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#nature">Природа и классификация</a></li><li><a href="#beaming">Релятивистское усиление</a></li><li><a href="#variability">Переменность</a></li><li><a href="#neutrinos">Блазары и нейтрино</a></li></ol></div>
<p><strong>Блазар</strong> — разновидность <a class="wiki-link" onclick="showPage('quasars')" data-id="quasars">квазара</a> или галактики с активным ядром, у которой релятивистский джет направлен практически в сторону Земли. В результате релятивистского доплеровского усиления наблюдаемая яркость таких объектов в сотни и тысячи раз превышает «истинную» яркость, а их излучение охватывает весь электромагнитный спектр — от радиоволн до гамма-фотонов тераэлектронвольтной энергии.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="nature">Природа и классификация</h2><p>Принято разделять блазары на два класса. <em>BL Lacertae objects</em> (BL Lac) — блазары со слабыми или отсутствующими эмиссионными линиями; их спектр практически непрерывен. <em>Плоскоспектральные квазары</em> (FSRQ) — блазары, сохраняющие широкие эмиссионные линии. Протожип класса — объект BL Lacertae в созвездии Ящерицы, долгое время числившийся переменной звездой, пока в 1968 году не была установлена его истинная природа.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="beaming">Релятивистское усиление</h2><p>Джет блазара движется со скоростью, составляющей 99% скорости света и более. Когда такой джет направлен на наблюдателя, релятивистская аберрация и эффект Доплера колоссально усиливают наблюдаемую яркость. Этот феномен называется «доплеровским усилением» или «бимингом» (<em>Doppler beaming</em>). Именно поэтому блазары видны через половину наблюдаемой Вселенной, тогда как большинство галактик с аналогичными джетами, ориентированными под углом, практически незаметны.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="variability">Переменность</h2><p>Блазары демонстрируют резкую переменность на всех длинах волн — поток излучения может измениться в несколько раз за часы или даже минуты. Такая быстрая переменность означает, что излучение рождается в компактной области, меньшей светового часа в поперечнике. Мониторинг переменности блазаров ведётся телескопами по всему земному шару в режиме, близком к непрерывному.<sup>[4]</sup></p>
<div class="note-box">🔭 <strong>Рекорд:</strong> Блазар PKS 0537-441 однажды вспыхнул настолько ярко, что был виден невооружённым глазом — с расстояния нескольких миллиардов световых лет.</div></div>
<div class="article-section"><h2 class="section-h2" id="neutrinos">Блазары как источники нейтрино</h2><p>В 2018 году телескоп IceCube зафиксировал высокоэнергетическое нейтрино IceCube-170922A, направление прихода которого совпало с блазаром TXS 0506+056 в момент его гамма-вспышки. Это стало первым свидетельством того, что блазары могут быть источниками космических лучей ультравысоких энергий.<sup>[5]</sup></p></div>`,

      id: 'gamma_ray_bursts', title: 'Гамма-всплески', category: 'space', emoji: '💥',

      summary: 'Гамма-всплеск (GRB) — кратковременная вспышка гамма-излучения, являющаяся самым энергетически мощным взрывным явлением во Вселенной. За время вспышки объект может высвечивать больше энергии, чем Солнце за всё своё существование.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#discovery">История открытия</a></li><li><a href="#types">Типы гамма-всплесков</a></li><li><a href="#afterglow">Послесвечение</a></li><li><a href="#kilonova">Килоновые</a></li></ol></div>
<p><strong>Гамма-всплеск</strong> (<em>Gamma-Ray Burst</em>, GRB) — кратковременная вспышка жёсткого гамма-излучения космического происхождения, являющаяся самым энергетически мощным из известных взрывных явлений. Изотропная эквивалентная энергия наиболее мощных GRB достигает 10⁴⁷ Дж.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="discovery">История открытия</h2><p>Гамма-всплески были случайно открыты в 1967 году американскими военными спутниками Vela, призванными контролировать соблюдение договора об ограничении ядерных испытаний. Первые сигналы по своему виду напоминали атмосферные ядерные взрывы, однако их форма и направление не соответствовали земному или лунному источнику. Данные были рассекречены в 1973 году.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="types">Типы гамма-всплесков</h2><h3 class="section-h3">Короткие GRB (< 2 секунд)</h3><p>Порождаются слиянием двух <a class="wiki-link" onclick="showPage('neutron_stars')" data-id="neutron_stars">нейтронных звёзд</a> или нейтронной звезды с <a class="wiki-link" onclick="showPage('black_holes')" data-id="black_holes">чёрной дырой</a> в двойной системе. Сопровождаются килоновой — взрывом, синтезирующим тяжёлые элементы.<sup>[3]</sup></p><h3 class="section-h3">Длинные GRB (> 2 секунд)</h3><p>Связаны с коллапсарами — гравитационным коллапсом ядра массивной вращающейся звезды (гиперновая). Являются ярчайшими известными <a class="wiki-link" onclick="showPage('supernovae')" data-id="supernovae">сверхновыми</a>.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="afterglow">Послесвечение</h2><p>После основной вспышки GRB оставляет «послесвечение» — постепенно угасающее излучение от рентгена до радиоволн, порождённое взаимодействием джета с окружающей межзвёздной средой. Наблюдение послесвечений позволило точно локализовать GRB в далёких галактиках и определить их космологическую природу.</p></div>
<div class="article-section"><h2 class="section-h2" id="kilonova">Килоновые и синтез тяжёлых элементов</h2><p>Слияния нейтронных звёзд порождают килоновые — взрывы с характерным инфракрасным послесвечением, обусловленным радиоактивным распадом тяжёлых r-процессных элементов: золота, платины, иридия и лантаноидов. Расчёты показывают, что бо́льшая часть золота на Земле образовалась именно в килоновых.<sup>[5]</sup></p>
<div class="note-box">🥇 <strong>Происхождение золота:</strong> Около 80% всего золота Земли было синтезировано в килоновых вспышках при слиянии нейтронных звёзд, а не при обычных взрывах сверхновых.</div></div>`,

      infobox: { 'Тёмная материя':'~27% содержимого Вселенной','Тёмная энергия':'~68% содержимого Вселенной','Барионная материя':'~5%','Обнаружена косвенно':'1933 (Цвикки)','Природа':'Неизвестна','Кандидаты':'WIMP, аксион, стерильное нейтрино' },
      summary: 'Тёмная материя и тёмная энергия — два загадочных компонента Вселенной, составляющих в совокупности около 95% её общего содержимого. Несмотря на косвенные свидетельства существования обоих, их природа остаётся одной из главных нерешённых проблем физики.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#dark_matter_section">Тёмная материя</a></li><li><a href="#dark_energy_section">Тёмная энергия</a></li><li><a href="#evidence">Доказательства</a></li><li><a href="#candidates">Кандидаты</a></li></ol></div>
<p>Стандартная космологическая модель (ΛCDM) утверждает, что привычная барионная материя — атомы, звёзды, планеты — составляет лишь около 5% содержимого Вселенной. Остальные 95% приходятся на <strong>тёмную материю</strong> (~27%) и <strong>тёмную энергию</strong> (~68%) — компоненты, которые не взаимодействуют с электромагнитным излучением и потому невидимы в прямом смысле слова.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="dark_matter_section">Тёмная материя</h2><p>Концепция тёмной материи возникла в 1933 году, когда Фриц Цвикки, изучая скопление Кома, обнаружил, что видимая масса кластера в ~400 раз меньше той, которая требуется для объяснения наблюдаемых скоростей галактик. В 1970-х годах Вера Рубин и Кент Форд показали, что кривые вращения спиральных галактик несовместимы с видимым распределением массы — периферийные части галактик вращаются слишком быстро.<sup>[2]</sup></p>
<div class="note-box">🔭 <strong>Пуля Кластер:</strong> Столкновение двух скоплений галактик 1E 0657-558 показало, что тёмная материя «прошла сквозь» столкновение без торможения, тогда как горячий газ затормозился — прямейшее свидетельство существования тёмной материи.</div></div>
<div class="article-section"><h2 class="section-h2" id="dark_energy_section">Тёмная энергия</h2><p>В 1998 году два независимых коллектива астрономов, изучавших сверхновые типа Ia в далёких галактиях, обнаружили, что Вселенная не просто расширяется, но и <em>ускоряется</em> в расширении. Источником этого ускорения была названа «тёмная энергия» — субстанция с отрицательным давлением, пронизывающая весь космос. Открытие принесло его авторам Нобелевскую премию 2011 года.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="candidates">Кандидаты на роль тёмной материи</h2><p>Среди теоретических кандидатов — слабовзаимодействующие массивные частицы (WIMP), аксионы, стерильные нейтрино и первичные чёрные дыры. Ни один из кандидатов пока не обнаружен в прямых экспериментах, несмотря на масштабные поиски в подземных детекторах, на коллайдерах и космических телескопах.<sup>[4]</sup></p></div>`,
      see_also: ['galaxies','black_holes','supernovae'],
      refs: ['Zwicky F. Die Rotverschiebung von extragalaktischen Nebeln. Helv. Phys. Acta, 1933.','Rubin V., Ford W.K. Rotation of the Andromeda Nebula. ApJ, 1970.','Perlmutter S. et al. Measurements of Omega and Lambda from 42 High-z Supernovae. ApJ, 1999.','Aprile E. et al. XENON1T Dark Matter Search. Phys. Rev. Lett., 2018.']

      infobox: { 'Число галактик':'~2 трлн (наблюд. Вселенная)','Типы':'Эллипт., спиральные, неправ.','Наша галактика':'Млечный Путь','Тип Млечного Пути':'Сп. с перемычкой (SBbc)','Диаметр МП':'≈100 000 св. лет','Число звёзд в МП':'≈200–400 млрд' },
      summary: 'Галактика — гравитационно связанная система из звёзд, межзвёздного газа, пыли, тёмной материи и других объектов. Является основной структурной единицей крупномасштабной структуры Вселенной.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#types">Типы галактик</a></li><li><a href="#milkyway">Млечный Путь</a></li><li><a href="#agn">Активные ядра галактик</a></li><li><a href="#lss">Крупномасштабная структура</a></li></ol></div>
<p><strong>Галактика</strong> — гравитационно связанная система из звёзд, газа, пыли и <a class="wiki-link" onclick="showPage('dark_matter')" data-id="dark_matter">тёмной материи</a>. Галактики являются основными «строительными блоками» Вселенной и образуют иерархические структуры: группы, скопления и сверхскопления.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="types">Классификация галактик</h2><h3 class="section-h3">Эллиптические галактики</h3><p>Имеют форму от сферической (E0) до вытянутой (E7). Состоят преимущественно из старых звёзд, содержат мало газа и пыли. Крупнейшие галактики во Вселенной — эллиптические: NGC 1277, IC 1101.</p><h3 class="section-h3">Спиральные галактики</h3><p>Обладают плоским диском со спиральными рукавами и центральным балджем. Богаты газом и активно формируют новые звёзды. К этому типу относится наш Млечный Путь.</p><h3 class="section-h3">Неправильные галактики</h3><p>Не имеют чёткой структуры; часто являются результатом галактических слияний. Крупнейшие спутники Млечного Пути — Большое и Малое Магеллановы Облака — принадлежат к этому классу.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="milkyway">Млечный Путь</h2><p>Наша Галактика — спираль с перемычкой типа SBbc диаметром около 100 000 световых лет и толщиной диска ~2 000 световых лет. В её центре находится сверхмассивная <a class="wiki-link" onclick="showPage('black_holes')" data-id="black_holes">чёрная дыра</a> Стрелец A* массой ~4 × 10⁶ M☉. Солнечная система расположена в рукаве Ориона на расстоянии около 26 000 световых лет от центра.</p></div>
<div class="article-section"><h2 class="section-h2" id="agn">Активные ядра галактик</h2><p>Многие галактики прошли через активную фазу, когда центральная чёрная дыра активно поглощала вещество и светилась как <a class="wiki-link" onclick="showPage('quasars')" data-id="quasars">квазар</a>. Сегодня такие галактики называют «сейфертовскими» или «радиогалактиками» в зависимости от наблюдаемых свойств.</p></div>
<div class="article-section"><h2 class="section-h2" id="lss">Крупномасштабная структура</h2><p>Галактики распределены в пространстве не хаотично, а образуют нитевидные структуры («стены» и «нити»), разделённые гигантскими войдами (пустотами). Эта «космическая паутина» является прямым следствием первичных флуктуаций плотности в ранней Вселенной, усиленных гравитацией.</p></div>`,
      see_also: ['quasars','blazars','dark_matter','black_holes'],
      refs: ['Hubble E. A Relation between Distance and Radial Velocity among Extra-Galactic Nebulae. PNAS, 1929.','de Vaucouleurs G. Classification and Morphology of External Galaxies. ApJS, 1959.','Ghez A.M. et al. Sgr A* at the Center of the Milky Way. ApJ, 2008.']

      id: 'nebulae', title: 'Туманности', category: 'space', emoji: '🌸',
      infobox: { 'Типы':'Диффузные, планетарные, остатки СН','Состав':'Газ (H, He, металлы), пыль','Первое описание':'де Мэран, 1731','Пример (диффузная)':'Туманность Орла (M16)','Пример (планетарная)':'Туманность Кольцо (M57)','Пример (остаток СН)':'Крабовидная туманность' },
      summary: 'Туманность — межзвёздное облако из газа, пыли и плазмы. Является как местом рождения звёзд (эмиссионные туманности), так и конечным продуктом их жизни (планетарные туманности, остатки сверхновых).',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#types">Типы туманностей</a></li><li><a href="#emission">Эмиссионные туманности</a></li><li><a href="#planetary">Планетарные туманности</a></li><li><a href="#snr">Остатки сверхновых</a></li></ol></div>
<p><strong>Туманность</strong> (от лат. <em>nebula</em> — туман, облако) — межзвёздное облако из газа, пыли и плазмы, наблюдаемое либо в отражённом/испущенном свете, либо как тёмный силуэт на фоне более ярких источников.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="types">Типы туманностей</h2><p>Выделяют несколько основных типов: эмиссионные (ионизованный газ светится под воздействием ультрафиолета молодых звёзд), отражательные (пыль рассеивает свет близких звёзд), тёмные (непрозрачные облака, видимые в силуэт), планетарные (оболочки, сброшенные умирающими звёздами) и остатки сверхновых.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="emission">Эмиссионные туманности как колыбели звёзд</h2><p>Знаменитые «Столпы Творения» в Туманности Орла (M16) — плотные облачные столбы, в которых продолжается активное звёздообразование. Новорождённые звёзды своим излучением постепенно рассеивают окружающее облако, «высвечивая» следующее поколение звёзд.<sup>[3]</sup></p>
<div class="note-box">📸 <strong>Факт:</strong> Первый снимок «Столпов Творения» был сделан телескопом Хаббл в 1995 году и стал одной из самых известных астрофотографий в истории. В 2022 году «Джеймс Уэбб» сделал новый, несравненно более детальный снимок тех же Столпов.</div></div>
<div class="article-section"><h2 class="section-h2" id="planetary">Планетарные туманности</h2><p>«Планетарными» их назвал Уильям Гершель в конце XVIII века из-за поверхностного сходства с планетными дисками в малый телескоп. На самом деле к планетам они не имеют никакого отношения: это газовые оболочки, сброшенные в финале жизни звёздами с массой, сопоставимой с солнечной. После сброса оболочки обнажается горячий остаток — будущий <a class="wiki-link" onclick="showPage('white_dwarfs')" data-id="white_dwarfs">белый карлик</a>.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="snr">Остатки сверхновых</h2><p>Крабовидная туманность (M1) — остаток <a class="wiki-link" onclick="showPage('supernovae')" data-id="supernovae">сверхновой</a> 1054 года, зафиксированной китайскими астрономами. В её центре — <a class="wiki-link" onclick="showPage('pulsars')" data-id="pulsars">пульсар</a> Краба, вращающийся 30 раз в секунду. Расширяющаяся оболочка туманности содержит вещество, синтезированное в недрах взорвавшейся звезды.</p></div>`,
      see_also: ['supernovae','white_dwarfs','pulsars','neutron_stars'],
      refs: ['Herschel W. On the Construction of the Heavens. Phil. Trans., 1785.','Osterbrock D.E. Astrophysics of Gaseous Nebulae. Freeman, 1989.','Hester J.J. et al. Pillars of Creation. AJ, 1996.','Kwok S. The origin and evolution of planetary nebulae. PASP, 1994.']
    },

    exoplanets: {
      id: 'exoplanets', title: 'Экзопланеты', category: 'space', emoji: '🪐',
      infobox: { 'Первое открытие':'Мэйор и Кело, 1995','Подтверждённых':'> 5700 (2024)','Методы':'Транзитный, лучевых скоростей','Телескопы':'Кеплер, TESS, Джеймс Уэбб','Зона обитаемости':'Диапазон T для жидкой воды','Рекорд':'Kepler-442b (0,84 Z☉)' },
      summary: 'Экзопланета — планета, обращающаяся вокруг звезды за пределами Солнечной системы. Первая экзопланета у солнцеподобной звезды открыта в 1995 году; к 2024 году подтверждено более 5700 экзопланет.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#discovery">История открытий</a></li><li><a href="#methods">Методы обнаружения</a></li><li><a href="#types">Типы экзопланет</a></li><li><a href="#habitability">Зона обитаемости</a></li></ol></div>
<p><strong>Экзопланета</strong> (внесолнечная планета) — планетарное тело, обращающееся вокруг звезды, отличной от Солнца, или вокруг нескольких звёзд в кратной системе. Изучение экзопланет является одним из наиболее динамично развивающихся разделов современной астрофизики.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="discovery">История открытий</h2><p>Первая планета у пульсара обнаружена Алексом Вольщаном в 1992 году. В 1995 году Мишель Мэйор и Дидье Кело открыли 51 Pegasi b — первую экзопланету у солнцеподобной звезды. Это открытие было удостоено Нобелевской премии 2019 года. Телескоп Kepler (2009–2018) открыл более 2700 экзопланет транзитным методом.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="methods">Методы обнаружения</h2><p><em>Транзитный метод</em> — фиксация периодического ослабления блеска звезды, когда планета проходит по её диску. Используется в большинстве современных обзоров. <em>Метод лучевых скоростей</em> — измерение эффекта Доплера в спектре звезды, вызванного гравитационным влиянием планеты. <em>Прямое изображение</em> — наблюдение планеты непосредственно; применимо лишь к крупным планетам вдали от своих звёзд.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="types">Типы экзопланет</h2><p>Среди открытых экзопланет выделяют горячих юпитеров (газовые гиганты на тесных орбитах), суперземли (масса 1–10 M⊕), мини-нептуны (1,7–3,5 R⊕) и аналоги Земли. Статистика показывает, что в Галактике практически каждая звезда имеет хотя бы одну планету.</p></div>
<div class="article-section"><h2 class="section-h2" id="habitability">Зона обитаемости и атмосферная спектроскопия</h2><p>Зона обитаемости — диапазон орбитальных расстояний, при которых на поверхности планеты возможно существование жидкой воды. Телескоп Джеймс Уэбб позволяет исследовать атмосферы экзопланет методом трансмиссионной спектроскопии. В 2023 году в атмосфере суперземли K2-18b были обнаружены признаки диметилсульфида — потенциально биогенного соединения.<sup>[4]</sup></p>
<div class="note-box">🔍 <strong>2023:</strong> Телескоп Джеймс Уэбб впервые детально исследовал атмосферы нескольких планет в системе TRAPPIST-1, где семь планет земного размера обращаются вокруг красного карлика.</div></div>`,
      see_also: ['solar_system','nebulae','dark_matter'],
      refs: ['Wolszczan A., Frail D.A. A planetary system around the millisecond pulsar PSR1257+12. Nature, 1992.','Mayor M., Queloz D. A Jupiter-mass companion to a solar-type star. Nature, 1995.','Borucki W.J. et al. Kepler Planet-Detection Mission. Science, 2010.','Madhusudhan N. et al. K2-18b Atmosphere. ApJL, 2023.']
    },

    supernovae: {
      id: 'supernovae', title: 'Сверхновые', category: 'space', emoji: '🌟',
      infobox: { 'Типы':'I (термоядерные), II (коллапс ядра)','Пиковая светимость':'До 10⁴³ эрг/с','Историческая ближайшая':'SN 1987A (168 000 св. лет)','Источник тяжёлых элементов':'C, O, Ne, Mg, Si, S, Fe','Продукты':'Нейтронные звёзды, чёрные дыры','Частота в Млечном Пути':'~1–3 в столетие' },
      summary: 'Сверхновая — мощный взрыв, завершающий жизнь звезды. Является главным источником тяжёлых химических элементов во Вселенной и порождает как нейтронные звёзды, так и чёрные дыры.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#types">Типы сверхновых</a></li><li><a href="#nucleosynthesis">Нуклеосинтез</a></li><li><a href="#sn1987a">SN 1987A</a></li><li><a href="#cosmology">Космологическое применение</a></li></ol></div>
<p><strong>Сверхновая</strong> (<em>supernova</em>) — звёздный взрыв, при котором яркость объекта на короткое время сопоставима с яркостью всей галактики. Существует два принципиально различных механизма взрыва, соответствующих двум типам сверхновых.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="types">Типы сверхновых</h2><h3 class="section-h3">Тип Ia (термоядерный)</h3><p><a class="wiki-link" onclick="showPage('white_dwarfs')" data-id="white_dwarfs">Белый карлик</a> в двойной системе набирает вещество от звезды-компаньона (или сливается с другим белым карликом) до достижения предела Чандрасекара (~1,4 M☉), после чего происходит термоядерный взрыв, полностью разрушающий звезду. Не оставляет компактного остатка.<sup>[2]</sup></p><h3 class="section-h3">Тип II (гравитационный коллапс)</h3><p>Ядро массивной звезды (~8–100 M☉) исчерпывает ядерное горючее и коллапсирует в <a class="wiki-link" onclick="showPage('neutron_stars')" data-id="neutron_stars">нейтронную звезду</a> или <a class="wiki-link" onclick="showPage('black_holes')" data-id="black_holes">чёрную дыру</a>. Гигантская волна нейтрино и ударная волна выбрасывают внешние оболочки звезды.</p></div>
<div class="article-section"><h2 class="section-h2" id="nucleosynthesis">Нуклеосинтез и происхождение элементов</h2><p>Сверхновые синтезируют и рассеивают в межзвёздную среду значительную часть периодической таблицы: углерод, кислород, неон, магний, кремний, серу и железо образуются в ходе последовательных стадий ядерного горения и взрыва. Фраза «мы сделаны из звёздной пыли» имеет буквальный смысл: атомы нашего тела были синтезированы в недрах звёзд, а затем рассеяны сверхновыми.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="sn1987a">SN 1987A</h2><p>23 февраля 1987 года в Большом Магеллановом Облаке на расстоянии 168 000 световых лет вспыхнула сверхновая SN 1987A — первая видимая невооружённым глазом с 1604 года. За три часа до оптического максимума подземные детекторы Kamiokande и IMB зафиксировали поток нейтрино, подтвердив теорию коллапса ядра.<sup>[4]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="cosmology">Космологическое применение</h2><p>Сверхновые типа Ia являются «стандартными свечами» космологии: их пиковая абсолютная светимость хорошо откалибрована. Именно измерения расстояний до далёких сверхновых Ia в 1998 году привели к открытию <a class="wiki-link" onclick="showPage('dark_matter')" data-id="dark_matter">ускоренного расширения Вселенной</a>.</p></div>`,
      see_also: ['neutron_stars','black_holes','white_dwarfs','nebulae'],
      refs: ['Woosley S.E., Weaver T.A. The physics of supernova explosions. ARAA, 1986.','Chandrasekhar S. The Maximum Mass of Ideal White Dwarfs. ApJ, 1931.','Burbidge E.M. et al. Synthesis of the Elements in Stars. Rev. Mod. Phys., 1957.','Bionta R.M. et al. Observation of a neutrino burst. Phys. Rev. Lett., 1987.']
    },

    white_dwarfs: {
      id: 'white_dwarfs', title: 'Белые карлики', category: 'space', emoji: '⚪',
      infobox: { 'Тип':'Компактный звёздный остаток','Масса':'0,5–1,4 M☉ (предел Чандрасекара)','Радиус':'~Размер Земли','Плотность':'~10⁶ г/см³','Состав':'C/O ядро, гелиево-водородная оболочка','Судьба':'Остывание → чёрный карлик' },
      summary: 'Белый карлик — компактный звёздный остаток, образующийся в финале жизни звёзд с начальной массой до ~8 M☉. Представляет собой сверхплотный объект размером с Землю, удерживаемый от коллапса давлением вырожденных электронов.',
      full_text: `
<div class="toc"><div class="toc-title">Содержание</div><ol><li><a href="#formation">Образование</a></li><li><a href="#structure">Физика</a></li><li><a href="#chandrasekhar">Предел Чандрасекара</a></li><li><a href="#fate">Судьба</a></li></ol></div>
<p><strong>Белый карлик</strong> — финальный эволюционный продукт большинства звёзд (включая Солнце). Когда звезда с начальной массой менее ~8 M☉ исчерпывает ядерное горючее, она сбрасывает внешние оболочки (образуя <a class="wiki-link" onclick="showPage('nebulae')" data-id="nebulae">планетарную туманность</a>), а горячее инертное ядро из углерода и кислород остаётся обнажённым как белый карлик.<sup>[1]</sup></p>
<div class="article-section"><h2 class="section-h2" id="formation">Образование</h2><p>Солнце через ~5 млрд лет раздуется в красный гигант, поглотив Меркурий и, возможно, Венеру и Землю. Затем его внешние слои разлетятся в пространстве, а ядро — остаток размером с Землю, но с массой Солнца — будет медленно остывать миллиарды лет.</p></div>
<div class="article-section"><h2 class="section-h2" id="structure">Физика белых карликов</h2><p>Белый карлик удерживается от дальнейшего сжатия не тепловым давлением, а <em>давлением вырожденных электронов</em> — квантовомеханическим эффектом, запрещающим двум электронам занимать одинаковое состояние (принцип Паули). Это давление не зависит от температуры, что означает: белый карлик не «лопнет» и не схлопнется даже после полного остывания.<sup>[2]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="chandrasekhar">Предел Чандрасекара</h2><p>Субраманьян Чандрасекар в 1931 году показал, что максимальная масса белого карлика составляет ~1,4 M☉ (предел Чандрасекара). При превышении этого предела давление вырожденных электронов не может компенсировать гравитацию, и объект коллапсирует в <a class="wiki-link" onclick="showPage('neutron_stars')" data-id="neutron_stars">нейтронную звезду</a> или взрывается как <a class="wiki-link" onclick="showPage('supernovae')" data-id="supernovae">сверхновая Ia</a>.<sup>[3]</sup></p></div>
<div class="article-section"><h2 class="section-h2" id="fate">Дальнейшая судьба</h2><p>Белый карлик медленно остывает за десятки миллиардов лет, постепенно переходя из белого в жёлтый, оранжевый и красный цвет. Конечный продукт — гипотетический «чёрный карлик» — тёмный холодный кристаллический объект. Однако возраст Вселенной (13,8 млрд лет) ещё недостаточен для образования первого чёрного карлика: даже самые старые белые карлики ещё не успели остыть до этой стадии.</p></div>`,
      see_also: ['neutron_stars','supernovae','nebulae','solar_system'],
      refs: ['Chandrasekhar S. The maximum mass of ideal white dwarfs. ApJ, 1931.','Shapiro S.L., Teukolsky S.A. Black Holes, White Dwarfs, and Neutron Stars. Wiley, 1983.','Liebert J. White Dwarf Stars. ARAA, 1980.']
    },
